<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schauer Stats</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:      #1C2B4B;
      --navy2:     #243460;
      --bg:        #F0F2F6;
      --white:     #FFFFFF;
      --border:    #DDE1EA;
      --text:      #111827;
      --muted:     #6B7280;
      --accent:    #3B5BDB;
      --win:       #16a34a;
      --loss:      #dc2626;
      --nav-h:     52px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); -webkit-text-size-adjust: 100%; }
    body { font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; }
    #root { min-height: 100vh; display: flex; flex-direction: column; }

    /* NAV */
    nav { background: var(--navy); height: var(--nav-h); display: flex; align-items: center;
          padding: 0 1.5rem; position: sticky; top: 0; z-index: 200; box-shadow: 0 1px 8px rgba(0,0,0,.3); }
    .nav-brand { font-family:'Outfit',sans-serif; font-weight:800; font-size:1rem; color:#fff;
                 cursor:pointer; white-space:nowrap; margin-right:auto; padding-right:1rem; }
    .nav-links { display:flex; }
    .nav-link { color:rgba(255,255,255,.7); font-size:.74rem; font-weight:500; cursor:pointer;
                padding:.45rem .7rem; border-radius:5px; letter-spacing:.04em; text-transform:uppercase;
                white-space:nowrap; transition:color .12s, background .12s; }
    .nav-link:hover { color:#fff; background:rgba(255,255,255,.08); }
    .nav-link.active { color:#fff; }
    .nav-toggle { display:none; background:none; border:none; cursor:pointer; padding:.25rem; color:#fff; line-height:1; }
    @media (max-width:680px) {
      .nav-links { display:none; flex-direction:column; position:absolute; top:var(--nav-h);
                   left:0; right:0; background:var(--navy); padding:.5rem 0; z-index:199;
                   box-shadow:0 4px 12px rgba(0,0,0,.3); }
      .nav-links.open { display:flex; }
      .nav-link { padding:.7rem 1.5rem; border-radius:0; font-size:.8rem; }
      .nav-toggle { display:block; }
    }

    /* LAYOUT */
    .page { padding:2rem 1.5rem; max-width:1200px; margin:0 auto; width:100%; flex:1; }
    .page-title { font-family:'Outfit',sans-serif; font-size:1.5rem; font-weight:800; color:var(--navy); margin-bottom:.25rem; }
    .page-sub { color:var(--muted); font-size:.8rem; margin-bottom:1.5rem; line-height:1.5; }
    .back-btn { display:inline-flex; align-items:center; gap:.3rem; color:var(--muted); font-size:.8rem;
                cursor:pointer; margin-bottom:1.25rem; background:none; border:none; padding:0; }
    .back-btn:hover { color:var(--navy); }

    /* TABLES */
    .table-wrap { background:var(--white); border-radius:10px; border:1px solid var(--border); overflow:hidden; }
    .toolbar { padding:.7rem 1rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; }
    .srch { border:1px solid var(--border); border-radius:6px; padding:.38rem .75rem;
            font-family:'IBM Plex Sans',sans-serif; font-size:.82rem; outline:none;
            width:185px; background:var(--bg); transition:border-color .15s; }
    .srch:focus { border-color:var(--accent); background:#fff; }
    .csel { border:1px solid var(--border); border-radius:6px; padding:.38rem .75rem;
            font-family:'IBM Plex Sans',sans-serif; font-size:.82rem; background:var(--bg);
            outline:none; cursor:pointer; max-width:155px; }
    .rcount { margin-left:auto; color:var(--muted); font-size:.74rem; white-space:nowrap; }
    .tscroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .shint { display:none; font-size:.7rem; color:var(--muted); padding:.3rem 1rem; border-bottom:1px solid var(--border); }
    @media(max-width:680px) { .shint { display:block; } }
    table { width:100%; border-collapse:collapse; min-width:520px; }
    thead tr { background:var(--navy); }
    thead th { padding:.58rem .85rem; font-family:'Outfit',sans-serif; font-size:.63rem; font-weight:700;
               color:rgba(255,255,255,.8); letter-spacing:.08em; text-transform:uppercase;
               text-align:left; white-space:nowrap; cursor:pointer; user-select:none; }
    thead th:hover { color:#fff; }
    thead th .si { margin-left:.2em; opacity:.5; font-size:.65em; }
    thead th.sorted .si { opacity:1; }
    tbody tr { border-bottom:1px solid var(--border); transition:background .08s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:#f5f7fc; }
    tbody td { padding:.52rem .85rem; font-size:.83rem; }
    .rc { color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:.75rem; width:42px; }

    /* Mobile: layout matching screenshot #2 — tight, single-line team names */
    @media(max-width:680px) {
      table        { min-width:0 !important; width:100%; }
      tbody td     { padding:.2rem .2rem; font-size:.64rem; }
      thead th     { padding:.32rem .2rem; font-size:.52rem; letter-spacing:.03em; }
      .hide-mob    { display:none !important; }
      .hide-mob-sm { display:none !important; }
      /* Team: single line, truncate only the longest names */
      .sticky-team { left:26px !important; white-space:nowrap; max-width:120px;
                     overflow:hidden; text-overflow:ellipsis; }
      /* Rank: as narrow as possible */
      .sticky-rank { width:24px; min-width:24px; }
      .rc          { width:24px; min-width:24px; font-size:.62rem; }
      /* Numeric cells: very tight */
      .hc          { font-size:.58rem; padding:.14rem .16rem !important; white-space:nowrap; }
      .mono        { font-size:.58rem; white-space:nowrap; }
      /* Conference badge: compact */
      .cb          { font-size:.6rem; padding:.07rem .28rem; border-radius:3px; }
      /* Reduce page side padding to gain ~10px each side */
      .page        { padding:1.25rem .75rem; }
      .page-title  { font-size:1.25rem; }
      .team-banner h1 { font-size:1.25rem; }
      .sbox .val   { font-size:.95rem; }
    }

    /* Team page: games left, charts stacked right */
    .team-layout { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; align-items:start; }
    .team-charts-col { display:flex; flex-direction:column; gap:1.2rem; }
    @media(max-width:680px) { .team-layout { grid-template-columns:1fr; } }

    /* Section header inside games card */
    .games-section-hdr {
      padding:.32rem 1rem; background:var(--bg); font-size:.67rem; font-weight:600;
      color:var(--muted); letter-spacing:.06em; text-transform:uppercase;
      border-bottom:1px solid var(--border);
    }

    /* Sticky first two columns in ratings table */
    .sticky-rank {
      position: sticky; left: 0; z-index: 1;
      background: var(--white);
    }
    .sticky-team {
      position: sticky; left: 42px; z-index: 1;
      background: var(--white);
      /* subtle right shadow to show content is scrolling under */
      box-shadow: 2px 0 4px rgba(28,43,75,.06);
    }
    thead tr .sticky-rank,
    thead tr .sticky-team {
      background: var(--navy);
      z-index: 2;
    }
    tbody tr:hover .sticky-rank,
    tbody tr:hover .sticky-team {
      background: #f5f7fc;
    }
    .tl { color:var(--navy); font-weight:600; cursor:pointer; }
    .tl:hover { color:var(--accent); text-decoration:underline; }
    .cb { display:inline-block; background:#EEF1F9; color:var(--navy2); border-radius:4px;
          padding:.11rem .42rem; font-size:.69rem; font-weight:600; cursor:pointer; white-space:nowrap; }
    .cb:hover { background:#dce2f4; }
    .hc { font-family:'IBM Plex Mono',monospace; font-size:.77rem; border-radius:3px;
          padding:.22rem .48rem !important; text-align:right; }
    .mono { font-family:'IBM Plex Mono',monospace; font-size:.77rem; }
    .win  { color:var(--win); font-weight:600; }
    .loss { color:var(--loss); font-weight:600; }

    /* HOME */
    .home-wrap { padding:2.5rem 1.5rem 3rem; max-width:1200px; margin:0 auto; }
    .home-title { font-family:'Outfit',sans-serif; font-size:2rem; font-weight:800; color:var(--navy); margin-bottom:.4rem; }
    .home-sub { color:var(--muted); margin-bottom:2.25rem; font-size:.9rem; }
    .card-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(255px,1fr)); gap:1.25rem; }
    .card { background:var(--white); border-radius:10px; border:1px solid var(--border); overflow:hidden;
            cursor:pointer; transition:transform .15s, box-shadow .15s; }
    .card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(28,43,75,.1); }
    .card-img { height:125px; background:var(--bg); overflow:hidden; }
    .card-img svg { width:100%; height:100%; }
    .card-body { padding:1rem 1.2rem 1.3rem; }
    .card-body h3 { font-family:'Outfit',sans-serif; font-weight:700; font-size:.93rem; color:var(--navy); margin-bottom:.3rem; }
    .card-body p { color:var(--muted); font-size:.81rem; line-height:1.55; margin-bottom:1rem; }
    .card-btn { background:var(--navy); color:#fff; border:none; border-radius:7px; padding:.58rem 1rem;
                font-family:'IBM Plex Sans',sans-serif; font-size:.81rem; font-weight:500; cursor:pointer; width:100%; }
    .card-btn:hover { background:var(--navy2); }

    /* TEAM PAGE */
    .team-banner { background:var(--navy); color:#fff; border-radius:10px; padding:1.4rem 1.5rem; margin-bottom:1.2rem; }
    .team-banner h1 { font-family:'Outfit',sans-serif; font-size:1.5rem; font-weight:800; margin-bottom:.2rem; line-height:1.2; }
    .conf-link { color:rgba(255,255,255,.6); font-size:.8rem; cursor:pointer; }
    .conf-link:hover { color:#fff; text-decoration:underline; }
    .banner-stats { display:flex; gap:1.5rem; margin-top:.9rem; flex-wrap:wrap; }
    .bstat .val { font-family:'IBM Plex Mono',monospace; font-size:1.25rem; color:#fff; line-height:1; }
    .bstat .lbl { font-size:.62rem; color:rgba(255,255,255,.55); letter-spacing:.07em; text-transform:uppercase; margin-top:.18rem; }
    .stat-row { display:flex; gap:.7rem; margin-bottom:1.2rem; flex-wrap:wrap; }
    .sbox { background:var(--white); border:1px solid var(--border); border-radius:8px; padding:.7rem .95rem; flex:1; min-width:95px; }
    .sbox .val { font-family:'IBM Plex Mono',monospace; font-size:1.15rem; color:var(--navy); line-height:1; }
    .sbox .lbl { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-top:.18rem; }
    .cbox { background:var(--white); border-radius:10px; border:1px solid var(--border); overflow:hidden; margin-bottom:1.2rem; }
    .box-hdr { padding:.65rem 1rem; border-bottom:1px solid var(--border); font-size:.77rem; font-weight:600; color:var(--navy);
               display:flex; justify-content:space-between; align-items:center; }
    .box-body { padding:.8rem 1rem; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; }
    @media(max-width:680px) { .two-col { grid-template-columns:1fr; } }
    .scard { background:var(--white); border-radius:10px; border:1px solid var(--border); overflow:hidden; }
    .grow { display:flex; align-items:center; padding:.48rem 1rem; border-bottom:1px solid var(--border); gap:.5rem; font-size:.79rem; }
    .grow:last-child { border-bottom:none; }
    .gdate { color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:.7rem; width:58px; flex-shrink:0; }
    .gha   { font-size:.67rem; width:20px; flex-shrink:0; text-align:center; color:var(--muted); }
    .gopp  { flex:1; font-weight:500; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
    .gopp:hover { color:var(--accent); text-decoration:underline; }
    .gsc  { font-family:'IBM Plex Mono',monospace; font-size:.77rem; text-align:right; white-space:nowrap; min-width:55px; }
    .gwab { font-family:'IBM Plex Mono',monospace; font-size:.7rem; text-align:right; min-width:48px; white-space:nowrap; }
    .muted-c { color:var(--muted); }
    .empty { padding:1.2rem 1rem; color:var(--muted); font-size:.81rem; }
    .sbtn { font-size:.68rem; padding:.15rem .45rem; border-radius:3px; border:1px solid var(--border); cursor:pointer; background:transparent; color:var(--muted); }
    .sbtn.active { background:var(--navy); color:#fff; border-color:var(--navy); }

    /* PREDICTIONS */
    .dhdr { padding:.38rem 1rem; background:var(--bg); font-size:.67rem; font-weight:600;
            color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }
    .prow { display:flex; align-items:center; padding:.52rem 1rem; border-bottom:1px solid var(--border); gap:.75rem; font-size:.83rem; }
    .prow:last-child { border-bottom:none; }
    .pmatch { flex:1; min-width:0; }
    .pline { display:flex; align-items:center; gap:.38rem; margin-bottom:.13rem; }
    .pline:last-child { margin-bottom:0; }
    .pha  { font-size:.67rem; color:var(--muted); width:20px; flex-shrink:0; }
    .pteam { font-weight:500; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
    .pteam:hover { color:var(--accent); text-decoration:underline; }
    .ppts { font-family:'IBM Plex Mono',monospace; font-size:.79rem; color:var(--muted); white-space:nowrap; }

    /* ACCURACY */
    .acc-stats { display:flex; gap:.7rem; margin-bottom:1.4rem; flex-wrap:wrap; }
    .astat { background:var(--white); border:1px solid var(--border); border-radius:8px; padding:.8rem 1rem; flex:1; min-width:105px; }
    .astat .val { font-family:'Outfit',sans-serif; font-size:1.4rem; font-weight:700; color:var(--navy); line-height:1; }
    .astat .lbl { font-size:.64rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-top:.18rem; }

    /* CONFERENCES */
    .chdr { background:var(--navy); border-radius:10px; padding:1.4rem 1.5rem; color:#fff;
            margin-bottom:1.2rem; display:flex; align-items:center; gap:2rem; flex-wrap:wrap; }
    .chdr h1 { font-family:'Outfit',sans-serif; font-size:1.4rem; font-weight:800; flex:1; }
    .cbs .val { font-family:'IBM Plex Mono',monospace; font-size:1.25rem; color:#fff; line-height:1; }
    .cbs .lbl { font-size:.62rem; color:rgba(255,255,255,.55); text-transform:uppercase; letter-spacing:.07em; margin-top:.18rem; }

    /* MISC */
    .spinner { width:28px; height:28px; border:2.5px solid var(--border); border-top-color:var(--navy);
               border-radius:50%; animation:spin .7s linear infinite; margin:3rem auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .errmsg { text-align:center; padding:3rem 1rem; color:var(--muted); font-size:.9rem; line-height:1.6; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// DATA FETCHING
const _cache = {};
async function fetchJSON(file) {
  if (_cache[file]) return _cache[file];
  const res = await fetch(`data/${file}`);
  if (!res.ok) throw new Error(`Could not load ${file} (${res.status})`);
  _cache[file] = await res.json();
  return _cache[file];
}
function useData(...files) {
  const [state, setState] = useState({ data: null, error: null, loading: true });
  const key = files.join(',');
  useEffect(() => {
    let cancelled = false;
    setState({ data: null, error: null, loading: true });
    Promise.all(files.map(fetchJSON))
      .then(data => { if (!cancelled) setState({ data, error: null, loading: false }); })
      .catch(err  => { if (!cancelled) setState({ data: null, error: err.message, loading: false }); });
    return () => { cancelled = true; };
  }, [key]);
  return state;
}

// ROUTER
function useRoute() {
  const [hash, setHash] = useState(window.location.hash || '#/');
  useEffect(() => {
    const h = () => setHash(window.location.hash || '#/');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const nav = useCallback(p => { window.location.hash = p; window.scrollTo(0,0); }, []);
  return { hash, nav };
}
function parseRoute(hash) {
  const p = hash.replace(/^#/, '') || '/';
  if (p === '/' || p === '')        return { page: 'home' };
  if (p === '/ratings')             return { page: 'ratings' };
  if (p === '/predictions')         return { page: 'predictions' };
  if (p === '/accuracy')            return { page: 'accuracy' };
  if (p === '/conferences')         return { page: 'conferences' };
  if (p.startsWith('/team/'))       return { page: 'team',       id: p.slice(6) };
  if (p.startsWith('/conference/')) return { page: 'conference', id: p.slice(12) };
  return { page: 'home' };
}

// HELPERS
function hs(val, min, max, rev = false) {
  if (val == null || !isFinite(min) || !isFinite(max) || min === max) return {};
  let t = (val - min) / (max - min);
  if (rev) t = 1 - t;
  t = Math.max(0, Math.min(1, t));
  const r = Math.round(28  + (220-28)  * (1-t));
  const g = Math.round(43  + (230-43)  * (1-t));
  const b = Math.round(75  + (255-75)  * (1-t));
  return { background: `rgb(${r},${g},${b})`, color: t > .5 ? '#fff' : '#111827' };
}
function wabHs(val, min, max) {
  // Same navy-blue scale as hs() but centered on zero:
  // high positive WAB = dark navy, near-zero = mid, highly negative = light
  if (val == null || !isFinite(min) || !isFinite(max) || min === max) return {};
  let t = (val - min) / (max - min);
  t = Math.max(0, Math.min(1, t));
  const r = Math.round(28  + (220-28)  * (1-t));
  const g = Math.round(43  + (230-43)  * (1-t));
  const b = Math.round(75  + (255-75)  * (1-t));
  return { background: `rgb(${r},${g},${b})`, color: t > .5 ? '#fff' : '#111827' };
}
function errHs(val, max) {
  const t = Math.min(val / (max||1), 1);
  return { background: `rgb(${Math.round(22+(220-22)*t)},${Math.round(163+(38-163)*t)},${Math.round(74+(38-74)*t)})`, color: '#fff' };
}
function useSort(c0, d0 = 'asc') {
  const [sc, setSc] = useState(c0);
  const [sd, setSd] = useState(d0);
  const tog = c => { if (c === sc) setSd(d => d==='asc'?'desc':'asc'); else { setSc(c); setSd('asc'); } };
  const ico = c => c === sc ? (sd==='asc' ? '▲' : '▼') : '⇅';
  return { sc, sd, tog, ico };
}
function srt(arr, c, d) {
  return [...arr].sort((a, b) => {
    const av = a[c], bv = b[c];
    if (av == null) return 1; if (bv == null) return -1;
    const cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv;
    return d === 'asc' ? cmp : -cmp;
  });
}
function fmtS(d) { try { return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); } catch { return d; } }
function fmtL(d) { try { return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}); } catch { return d; } }
function Spin()      { return <div className="spinner" />; }
function ErrMsg({m}) { return <div className="errmsg">Could not load data: {m}<br/><small>Make sure data files are committed to your repo.</small></div>; }

// SORTABLE TH
function Th({ col, sc, ico, tog, children, style, className }) {
  const cls = [sc===col ? 'sorted' : '', className||''].filter(Boolean).join(' ');
  return (
    <th className={cls} onClick={() => tog(col)} style={style}>
      {children} <span className="si">{ico(col)}</span>
    </th>
  );
}

// NAV
function Nav({ nav, hash }) {
  const [open, setOpen] = useState(false);
  const links = [
    ['#/ratings',     'D3 Ratings'],
    ['#/predictions', 'Predictions'],
    ['#/accuracy',    'Pred. Accuracy'],
    ['#/conferences', 'Conferences'],
  ];
  const go = href => { nav(href); setOpen(false); };
  return (
    <nav>
      <span className="nav-brand" onClick={() => go('#/')}>Schauer Stats</span>
      <button className="nav-toggle" onClick={() => setOpen(o => !o)} aria-label="Menu">
        {open
          ? <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd"/></svg>
          : <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clipRule="evenodd"/></svg>
        }
      </button>
      <div className={`nav-links${open ? ' open' : ''}`}>
        {links.map(([href, label]) => (
          <span key={href} className={`nav-link${hash===href ? ' active' : ''}`} onClick={() => go(href)}>{label}</span>
        ))}
      </div>
    </nav>
  );
}

// HOME
function BellSVG() {
  const pts = []; for (let x=-3.5; x<=3.5; x+=.1) pts.push([x, Math.exp(-.5*x*x)/Math.sqrt(2*Math.PI)]);
  const d = 'M ' + pts.map(([x,y]) => `${((x+3.5)/7)*230+10},${115-y*275}`).join(' L ');
  return <svg viewBox="0 0 250 125" xmlns="http://www.w3.org/2000/svg"><rect width="250" height="125" fill="#eaecf4"/><path d={d} fill="none" stroke="#1C2B4B" strokeWidth="2.2"/></svg>;
}
function SigmoidSVG() {
  const sig = x => 1/(1+Math.exp(-x));
  const lp = []; for (let x=-5; x<=5; x+=.2) lp.push(`${((x+5)/10)*230+10},${110-sig(x)*90-5}`);
  const dots = [-4,-3,-2,-1.2,-.4,.4,1.2,2,3,4];
  return (
    <svg viewBox="0 0 250 125" xmlns="http://www.w3.org/2000/svg">
      <rect width="250" height="125" fill="#eaecf4"/>
      <path d={'M ' + lp.join(' L ')} fill="none" stroke="#6b7280" strokeWidth="1.5" strokeDasharray="5,3"/>
      {dots.map((x,i) => { const cy=110-Math.min(1,Math.max(0,sig(x)+(Math.sin(x*5)*.03)))*90-5; return <circle key={i} cx={((x+5)/10)*230+10} cy={cy} r="3.5" fill="#1C2B4B" opacity=".8"/>; })}
    </svg>
  );
}
function BarsSVG() {
  const vs=[38,55,72,90,110,140,162,142,115,85,60];
  return <svg viewBox="0 0 250 125" xmlns="http://www.w3.org/2000/svg"><rect width="250" height="125" fill="#eaecf4"/>{vs.map((h,i)=><rect key={i} x={10+i*21} y={120-h} width="16" height={h} rx="2" fill={`rgba(28,43,75,${.28+i/vs.length*.6})`}/>)}</svg>;
}
function ScatterSVG() {
  const pts=[[30,88],[55,68],[80,102],[110,82],[140,58],[170,92],[200,72],[225,48],[55,38],[130,108]];
  return <svg viewBox="0 0 250 125" xmlns="http://www.w3.org/2000/svg"><rect width="250" height="125" fill="#eaecf4"/><line x1="10" y1="10" x2="240" y2="115" stroke="#9ca3af" strokeWidth="1.5" strokeDasharray="4,3"/>{pts.map(([x,y],i)=>{const e=Math.abs(y-(10+x*(105/230)));return <circle key={i} cx={x} cy={y} r="4" fill={e<25?'#16a34a':'#dc2626'} opacity=".8"/>;})}</svg>;
}
function HomePage({ nav }) {
  const cards = [
    { title:'D3 Predictive Ratings',  desc:'Opponent-adjusted ratings covering offense, defense, and tempo for all 400+ D3 teams.', btn:'View Ratings',     href:'#/ratings',     Svg:BellSVG },
    { title:'Score Predictions',       desc:'Pre-game score predictions for upcoming games based on team ratings.',                   btn:'View Predictions', href:'#/predictions', Svg:SigmoidSVG },
    { title:'Prediction Accuracy',     desc:'Compare predicted vs. actual scores — see where the model excels and misses.',          btn:'View Accuracy',   href:'#/accuracy',    Svg:ScatterSVG },
    { title:'D3 Conferences',          desc:'Conference standings ranked by average rating with links to each conference page.',      btn:'View Conferences', href:'#/conferences', Svg:BarsSVG },
  ];
  return (
    <div className="home-wrap">
      <h1 className="home-title">D3 Men's Basketball</h1>
      <p className="home-sub">Ratings, predictions, and resume scores for all Division III teams</p>
      <div className="card-grid">
        {cards.map(c => (
          <div key={c.href} className="card" onClick={() => nav(c.href)}>
            <div className="card-img"><c.Svg/></div>
            <div className="card-body">
              <h3>{c.title}</h3><p>{c.desc}</p>
              <button className="card-btn" onClick={e => { e.stopPropagation(); nav(c.href); }}>{c.btn}</button>
            </div>

// RATINGS + RESUME (COMBINED)
// ALL hooks run unconditionally before any early return
function RatingsPage({ nav }) {
  const { data, loading, error } = useData('teams.json');
  const [search, setSearch] = useState('');
  const [cf, setCf] = useState('All');
  const { sc, sd, tog, ico } = useSort('rank', 'asc');

  const teams = useMemo(() => (data ? data[0] : null) || [], [data]);
  const confs = useMemo(() => ['All', ...[...new Set(teams.map(t => t.conference))].sort()], [teams]);
  const rows  = useMemo(() => {
    let r = teams;
    if (search) { const q = search.toLowerCase(); r = r.filter(t => t.full_team.toLowerCase().includes(q)); }
    if (cf !== 'All') r = r.filter(t => t.conference === cf);
    return srt(r, sc, sd);
  }, [teams, search, cf, sc, sd]);

  const ra = rows.map(t => +t.rating).filter(isFinite);
  const of = rows.map(t => +t.off).filter(isFinite);
  const df = rows.map(t => +t.def).filter(isFinite);
  const wb = rows.map(t => t.wab != null ? +t.wab : null).filter(v => v != null && isFinite(v));
  const [rn,rx] = ra.length ? [Math.min(...ra), Math.max(...ra)] : [0,1];
  const [on,ox] = of.length ? [Math.min(...of), Math.max(...of)] : [0,1];
  const [dn,dx] = df.length ? [Math.min(...df), Math.max(...df)] : [0,1];
  const [wn,wx] = wb.length ? [Math.min(...wb), Math.max(...wb)] : [-1,1];
  const wqa = rows.map(t => t.win_qual  != null ? +t.win_qual  : null).filter(v => v != null && isFinite(v));
  const lqa = rows.map(t => t.loss_qual != null ? +t.loss_qual : null).filter(v => v != null && isFinite(v));
  const [wqn,wqx] = wqa.length ? [Math.min(...wqa), Math.max(...wqa)] : [0,1];
  const [lqn,lqx] = lqa.length ? [Math.min(...lqa), Math.max(...lqa)] : [-1,0];

  return (

        <div className="tscroll">
          <table>

              <Th col="full_team"  sc={sc} ico={ico} tog={tog} style={{position:'sticky',zIndex:2,background:'var(--navy)',boxShadow:'2px 0 4px rgba(28,43,75,.12)'}}>Team</Th>

                  <td className="hc" style={hs(+t.off,    on, ox)}>{(+t.off).toFixed(1)}</td>

// PREDICTIONS
function PredictionsPage({ nav }) {
  const { data, loading, error } = useData('future_games.json');
  const [search, setSearch] = useState('');
  const games    = useMemo(() => (data ? data[0] : null) || [], [data]);
  const filtered = useMemo(() => {
    if (!search) return games;
    const q = search.toLowerCase();
    return games.filter(g => g.team_1.toLowerCase().includes(q) || g.team_2.toLowerCase().includes(q));
  }, [games, search]);
  const grouped  = useMemo(() => {
    const m = {};

  if (loading) return <Spin />;

  return (

// ACCURACY — ALL hooks BEFORE early returns (prevents blank page bug)
function AccuracyPage({ nav }) {
  const { data, loading, error } = useData('games_2026.json');
  const [search, setSearch] = useState('');
  const { sc, sd, tog, ico } = useSort('date', 'desc');

  const allGames = useMemo(() => {
    if (!data) return [];
    return (data[0] || []).filter(g => g.pred_score_1 != null && g.pred_score_2 != null);
  }, [data]);

  const filtered = useMemo(() => {
    let r = allGames;
    if (search) { const q = search.toLowerCase(); r = r.filter(g => g.team_1.toLowerCase().includes(q) || g.team_2.toLowerCase().includes(q)); }
    return srt(r, sc, sd);
  }, [allGames, search, sc, sd]);

  const stats = useMemo(() => {
    const errs = allGames.map(g => g.error).filter(e => e != null && isFinite(e));
    if (!errs.length) return { mae: '-', n: 0, w5: 0, w10: 0, pct10: '-', maxErr: 1 };
    return {
      mae:   (errs.reduce((s,e) => s+e, 0) / errs.length).toFixed(1),
      n:     errs.length,
      w5:    errs.filter(e => e <= 5).length,
      w10:   errs.filter(e => e <= 10).length,
      pct10: (errs.filter(e => e <= 10).length / errs.length * 100).toFixed(0) + '%',
      maxErr: Math.max(...errs),
    };
  }, [allGames]);

  if (loading) return <Spin />;
  if (error)   return <ErrMsg m={error} />;

  return (
    <div className="page">
      <h1 className="page-title">2025-26 Prediction Accuracy</h1>
      <p className="page-sub">Predicted vs. actual scores for all completed games &middot; Click a team name to see their profile</p>
      <div className="acc-stats">
        {[{val:stats.mae,lbl:'Mean Abs. Error'},{val:stats.n,lbl:'Games Predicted'},{val:stats.w5,lbl:'Within 5 pts'},{val:stats.w10,lbl:'Within 10 pts'},{val:stats.pct10,lbl:'Within 10 pts %'}].map(s => (
          <div key={s.lbl} className="astat"><div className="val">{s.val}</div><div className="lbl">{s.lbl}</div></div>
        ))}
      </div>
      <div className="table-wrap">
        <div className="toolbar">
          <input className="srch" placeholder="Search teams..." value={search} onChange={e => setSearch(e.target.value)} />
          <span className="rcount">{filtered.length} games</span>
        </div>
        <div className="shint">Scroll right to see all columns &rarr;</div>
        <div className="tscroll">
          <table>
            <thead><tr>
              <Th col="date"   sc={sc} ico={ico} tog={tog}>Date</Th>
              <Th col="team_1" sc={sc} ico={ico} tog={tog}>Team 1</Th>
              <th style={{color:'rgba(255,255,255,.7)',fontSize:'.6rem',letterSpacing:'.06em',textTransform:'uppercase',padding:'.58rem .5rem'}}>HA</th>
              <Th col="team_2" sc={sc} ico={ico} tog={tog}>Team 2</Th>
              <th style={{color:'rgba(255,255,255,.78)',fontSize:'.63rem',letterSpacing:'.07em',textTransform:'uppercase',padding:'.58rem .85rem'}}>Predicted</th>
              <th style={{color:'rgba(255,255,255,.78)',fontSize:'.63rem',letterSpacing:'.07em',textTransform:'uppercase',padding:'.58rem .85rem'}}>Actual</th>
              <Th col="error"  sc={sc} ico={ico} tog={tog}>Error</Th>
            </tr></thead>
            <tbody>
              {filtered.map((g,i) => {
                const hfa  = g.team_1_hfa === 1 ? 'vs' : g.team_1_hfa === -1 ? '@' : 'neu';
                const t1w  = g.team_1_score > g.team_2_score;
                const t2w  = g.team_2_score > g.team_1_score;
                const ps   = ((g.pred_score_1||0) - (g.pred_score_2||0)).toFixed(1);
                const as_  = g.team_1_score - g.team_2_score;
                return (
                  <tr key={i}>
                    <td className="mono" style={{whiteSpace:'nowrap'}}>{fmtS(g.date)}</td>
                    <td><span className={`tl${t1w?' win':''}`} onClick={() => nav(`#/team/${g.team_1_id}`)}>{g.team_1}</span></td>
                    <td style={{textAlign:'center',color:'var(--muted)',fontSize:'.7rem',padding:'.52rem .5rem'}}>{hfa}</td>
                    <td><span className={`tl${t2w?' win':''}`} onClick={() => nav(`#/team/${g.team_2_id}`)}>{g.team_2}</span></td>
                    <td className="mono" style={{whiteSpace:'nowrap'}}>{Math.round(g.pred_score_1)}-{Math.round(g.pred_score_2)} <span style={{color:'var(--muted)',fontSize:'.69rem'}}>({+ps>0?'+':''}{ps})</span></td>
                    <td className="mono" style={{whiteSpace:'nowrap'}}><span className={t1w?'win':t2w?'loss':''}>{g.team_1_score}</span>-<span className={t2w?'win':t1w?'loss':''}>{g.team_2_score}</span> <span style={{color:'var(--muted)',fontSize:'.69rem'}}>({as_>0?'+':''}{as_})</span></td>
                    <td><span className="hc" style={{...errHs(g.error,stats.maxErr),padding:'.19rem .44rem',borderRadius:3,fontSize:'.74rem'}}>{g.error!=null?(+g.error).toFixed(1):'-'}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// RATING HISTORY CHART
// y-axis fixed at -47..47 so all teams are on the same scale
// x-axis shows season ranges e.g. "12-13" — all inside JS expression braces, no raw apostrophes
function RHChart({ history }) {
  if (!history || history.length < 2) return <div className="empty">Not enough history to display.</div>;
  const W=560, H=190, P={t:14,r:16,b:28,l:40};
  const iW=W-P.l-P.r, iH=H-P.t-P.b;
  const seas = history.map(h => h.season);
  const minS=Math.min(...seas), maxS=Math.max(...seas);
  const ratings = history.map(h => h.rating);
  const minR = Math.min(-30, ...ratings);
  const maxR = Math.max( 30, ...ratings);
  const xS = s => P.l + ((s-minS)/(maxS-minS||1))*iW;
  const yS = r => P.t + (1-(r-minR)/(maxR-minR))*iH;
  const pts = history.map(h => [xS(h.season), yS(h.rating)]);
  const zeroY = yS(0);
  const yTicks = [];
  for (let v=Math.ceil(minR/10)*10; v<=maxR; v+=10) yTicks.push(v);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}} xmlns="http://www.w3.org/2000/svg">
      {zeroY>=P.t && zeroY<=H-P.b && <line x1={P.l} y1={zeroY} x2={W-P.r} y2={zeroY} stroke="#DDE1EA" strokeWidth="1" strokeDasharray="4,3"/>}
      {yTicks.map(v => (
        <g key={v}>
          <line x1={P.l-3} y1={yS(v)} x2={P.l} y2={yS(v)} stroke="#DDE1EA" strokeWidth="1"/>
          <text x={P.l-5} y={yS(v)+3.5} textAnchor="end" fontSize="9" fill="#9CA3AF">{v}</text>
        </g>
      ))}
      {history.map(h => {
        const y1 = String(h.season-1).slice(2);
        const y2 = String(h.season).slice(2);
        const label = y1 + '-' + y2;
        return (
          <g key={h.season}>
            <line x1={xS(h.season)} y1={H-P.b} x2={xS(h.season)} y2={H-P.b+3} stroke="#DDE1EA" strokeWidth="1"/>
            <text x={xS(h.season)} y={H-P.b+13} textAnchor="middle" fontSize="7.5" fill="#9CA3AF">{label}</text>
          </g>
        );
      })}
      <line x1={P.l} y1={P.t} x2={P.l} y2={H-P.b} stroke="#DDE1EA" strokeWidth="1"/>
      <line x1={P.l} y1={H-P.b} x2={W-P.r} y2={H-P.b} stroke="#DDE1EA" strokeWidth="1"/>
      <path d={'M ' + pts.map(p => p.join(',')).join(' L ')} fill="none" stroke="#1C2B4B" strokeWidth="2" strokeLinejoin="round"/>
      {pts.map(([x,y],i) => (
        <g key={i}>
          <circle cx={x} cy={y} r="4" fill="#3B5BDB" stroke="#fff" strokeWidth="1.5"/>
          <title>{history[i].season}: {history[i].rating} (Off {history[i].off} / Def {history[i].def})</title>
        </g>
      ))}
    </svg>
  );
}

// WAB HISTORY CHART (per-season wins above bubble)
function WABChart({ history }) {
  const wabData = history.filter(h => h.wab != null);
  if (!wabData || wabData.length < 2) return <div className="empty">Not enough WAB history to display.</div>;
  const W=560, H=170, P={t:12,r:16,b:28,l:46};
  const iW=W-P.l-P.r, iH=H-P.t-P.b;
  const seas = wabData.map(h => h.season);
  const wabs = wabData.map(h => h.wab);
  const minS=Math.min(...seas), maxS=Math.max(...seas);
  const minR = Math.min(-20, ...wabs);
  const maxR = Math.max( 10, ...wabs);
  const xS = s => P.l + ((s-minS)/(maxS-minS||1))*iW;
  const yS = r => P.t + (1-(r-minR)/(maxR-minR))*iH;
  const pts = wabData.map(h => [xS(h.season), yS(h.wab)]);
  const zeroY = yS(0);
  const range = maxR-minR;
  const step = range <= 15 ? 5 : range <= 30 ? 10 : 15;
  const yTicks = [];
  for (let v=Math.ceil(minR/step)*step; v<=maxR; v+=step) yTicks.push(v);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}} xmlns="http://www.w3.org/2000/svg">
      {zeroY>=P.t && zeroY<=H-P.b && <line x1={P.l} y1={zeroY} x2={W-P.r} y2={zeroY} stroke="#DDE1EA" strokeWidth="1" strokeDasharray="4,3"/>}
      {yTicks.map(v => (
        <g key={v}>
          <line x1={P.l-3} y1={yS(v)} x2={P.l} y2={yS(v)} stroke="#DDE1EA" strokeWidth="1"/>
          <text x={P.l-5} y={yS(v)+3.5} textAnchor="end" fontSize="9" fill="#9CA3AF">{v > 0 ? '+'+v : v}</text>
        </g>
      ))}
      {wabData.map(h => {
        const y1 = String(h.season-1).slice(2);
        const y2 = String(h.season).slice(2);
        return (
          <g key={h.season}>
            <line x1={xS(h.season)} y1={H-P.b} x2={xS(h.season)} y2={H-P.b+3} stroke="#DDE1EA" strokeWidth="1"/>
            <text x={xS(h.season)} y={H-P.b+13} textAnchor="middle" fontSize="7.5" fill="#9CA3AF">{y1 + '-' + y2}</text>
          </g>
        );
      })}
      <line x1={P.l} y1={P.t} x2={P.l} y2={H-P.b} stroke="#DDE1EA" strokeWidth="1"/>
      <line x1={P.l} y1={H-P.b} x2={W-P.r} y2={H-P.b} stroke="#DDE1EA" strokeWidth="1"/>
      <path d={'M ' + pts.map(p => p.join(',')).join(' L ')} fill="none" stroke="#1C2B4B" strokeWidth="2" strokeLinejoin="round"/>
      {pts.map(([x,y],i) => (
        <g key={i}>
          <circle cx={x} cy={y} r="4" fill="#3B5BDB" stroke="#fff" strokeWidth="1.5"/>
          <title>{wabData[i].season}: {wabData[i].wab > 0 ? '+' : ''}{wabData[i].wab} WAB</title>
        </g>
      ))}
    </svg>
  );
}

// TEAM PAGE
function TeamPage({ teamId, nav }) {
  const { data, loading, error } = useData('teams.json','games_2026.json','future_games.json','rating_history.json');
  const [gameSort, setGameSort] = useState('date');

  // Off rank and def rank computed before early returns (hooks must be unconditional)
  const offRank = useMemo(() => {
    if (!data) return null;
    const all = data[0] || [];
    const sorted = [...all].sort((a,b) => +b.off - +a.off);
    const idx = sorted.findIndex(t => t.team_id === teamId);
    return idx >= 0 ? idx + 1 : null;
  }, [data, teamId]);
  const defRank = useMemo(() => {
    if (!data) return null;
    const all = data[0] || [];
    const sorted = [...all].sort((a,b) => +a.def - +b.def);
    const idx = sorted.findIndex(t => t.team_id === teamId);
    return idx >= 0 ? idx + 1 : null;
  }, [data, teamId]);

  if (loading) return <Spin />;
  if (error)   return <ErrMsg m={error} />;

  const [td, g26, fg, hd] = data;
  const team = td.find(t => t.team_id === teamId);
  if (!team) return (
    <div className="page">
      <button className="back-btn" onClick={() => nav('#/ratings')}>&larr; All Teams</button>
      <div className="errmsg">Team not found. Make sure data files are up to date.</div>
    </div>
  );

  const hist     = hd.filter(h => h.team_id === teamId).sort((a,b) => a.season-b.season);
  const pastBase = g26.filter(g => g.team_1_id===teamId || g.team_2_id===teamId);
  const past     = pastBase.slice().sort((a,b) => b.date.localeCompare(a.date));
  const sortedPast = gameSort === 'wab'
    ? pastBase.slice().sort((a,b) => {
        const wa = teamId===a.team_1_id ? a.t1_wab : a.t2_wab;
        const wb = teamId===b.team_1_id ? b.t1_wab : b.t2_wab;
        if (wa==null&&wb==null) return 0; if (wa==null) return 1; if (wb==null) return -1;
        return wb - wa;
      })
    : past;
  const upcoming = fg.filter(g => g.team_1_id===teamId || g.team_2_id===teamId).sort((a,b) => a.date.localeCompare(b.date));

  function GRow({ g, fut }) {
    const it1   = g.team_1_id === teamId;
    const opp   = it1 ? g.team_2    : g.team_1;
    const oppId = it1 ? g.team_2_id : g.team_1_id;
    const ms = it1 ? g.team_1_score : g.team_2_score;
    const os = it1 ? g.team_2_score : g.team_1_score;
    const mp = it1 ? g.team_1_pred_score : g.team_2_pred_score;
    const op = it1 ? g.team_2_pred_score : g.team_1_pred_score;
    let ha;
    if (fut) { ha = g.hfa==='vs'?(it1?'vs':'@'):g.hfa==='@'?(it1?'@':'vs'):'n'; }
    else { const n=g.team_1_hfa; ha=n===0?'n':(it1?(n===1?'vs':'@'):(n===1?'@':'vs')); }
    const won  = !fut && ms > os;
    const lost = !fut && ms < os;
    const wab  = !fut ? (it1 ? g.t1_wab : g.t2_wab) : null;
    const haColor = ha==='vs'?'#2563eb':ha==='@'?'#7c3aed':'var(--muted)';
    // For upcoming: compute spread and win probability from team perspective
    const mySpread = fut ? (it1 ? g.spread : -g.spread) : null;
    const wp = fut && mySpread != null ? Math.round(1 / (1 + Math.exp(-0.152 * mySpread)) * 100) : null;
    return (
      <div className="grow">
        <span className="gdate">{fmtS(g.date)}</span>
        <span className="gha" style={{color:haColor}}>{ha}</span>
        <span className="gopp" onClick={() => nav(`#/team/${oppId}`)}>{opp}</span>
        {fut
          ? <span className="gsc" style={{color: mySpread > 0 ? 'var(--win)' : mySpread < 0 ? 'var(--loss)' : 'var(--muted)', fontWeight:600}}>
              {mySpread > 0 ? '+' : ''}{mySpread != null ? mySpread.toFixed(1) : '-'}
            </span>
          : <span className={`gsc ${won?'win':lost?'loss':''}`}>{ms}-{os}</span>}
        {fut
          ? <span className="gwab muted-c">{wp != null ? wp+'%' : '-'}</span>
          : <span className="gwab" style={{color:wab==null?'var(--muted)':wab>=0?'var(--win)':'var(--loss)'}}>
              {wab!=null ? (wab>=0?'+':'') + wab.toFixed(2) : '-'}
            </span>}
      </div>
    );
  }

  const statItems = [
    { val: (+team.off).toFixed(1),  lbl: 'Off Rating' },
    { val: (+team.def).toFixed(1),  lbl: 'Def Rating' },
    { val: (+team.pace).toFixed(1), lbl: 'Tempo' },
    team.wab       != null && { val: (team.wab>=0?'+':'')     + (+team.wab).toFixed(2), lbl: 'Wins Above Bubble' },
    team.win_qual  != null && { val: (+team.win_qual).toFixed(2),                        lbl: 'Win Quality' },
    team.loss_qual != null && { val: (+team.loss_qual).toFixed(2),                       lbl: 'Loss Quality' },
  ].filter(Boolean);

  return (
    <div className="page">
      <button className="back-btn" onClick={() => nav('#/ratings')}>&larr; All Teams</button>
      <div className="team-banner">
        <h1>{team.full_team}</h1>
        <span className="conf-link" onClick={() => nav(`#/conference/${team.conference_id}`)}>{team.conference} &rarr;</span>
        <div className="banner-stats">
          <div className="bstat"><div className="val">#{team.rank}</div><div className="lbl">Rating Rank</div></div>
          <div className="bstat"><div className="val">{(+team.rating).toFixed(1)}</div><div className="lbl">Rating</div></div>
          <div className="bstat"><div className="val">{team.record}</div><div className="lbl">Record</div></div>
          {offRank != null && <div className="bstat"><div className="val">#{offRank}</div><div className="lbl">Off Rank</div></div>}
          {defRank != null && <div className="bstat"><div className="val">#{defRank}</div><div className="lbl">Def Rank</div></div>}
          {team.resume_rank != null && <div className="bstat"><div className="val">#{team.resume_rank}</div><div className="lbl">Resume Rank</div></div>}
        </div>
      </div>
      <div className="stat-row">
        {statItems.map(s => <div key={s.lbl} className="sbox"><div className="val">{s.val}</div><div className="lbl">{s.lbl}</div></div>)}
      </div>

      <div className="team-layout">
        {/* LEFT: combined games table */}
        <div className="scard">
          <div className="box-hdr">
            <span>Games ({upcoming.length + past.length})</span>
            {past.length > 0 && (
              <div style={{display:'flex',alignItems:'center',gap:'.4rem'}}>
                <span style={{color:'var(--muted)',fontSize:'.7rem',fontWeight:400}}>Sort:</span>
                <button className={`sbtn${gameSort==='date'?' active':''}`} onClick={() => setGameSort('date')}>Date</button>
                <button className={`sbtn${gameSort==='wab'?' active':''}`}  onClick={() => setGameSort('wab')}>WAB</button>
              </div>
            )}
          </div>
          {upcoming.length > 0 && (
            <>
              <div className="games-section-hdr">Upcoming ({upcoming.length}) &mdash; Spread &middot; Win Prob</div>
              {upcoming.map((g,i) => <GRow key={'u'+i} g={g} fut={true} />)}
            </>
          )}
          <div className="games-section-hdr">
            {upcoming.length > 0 ? 'Results (' + past.length + ')' : 'Results (' + past.length + ')'}
            {' '}&mdash; Score &middot; WAB
          </div>
          {sortedPast.length === 0
            ? <div className="empty">No results yet.</div>
            : sortedPast.map((g,i) => <GRow key={'p'+i} g={g} fut={false} />)}
        </div>

        {/* RIGHT: charts stacked */}
        <div className="team-charts-col">
          <div className="cbox">
            <div className="box-hdr">Rating History</div>
            <div className="box-body"><RHChart history={hist} /></div>
          </div>
          <div className="cbox">
            <div className="box-hdr">Wins Above Bubble History</div>
            <div className="box-body"><WABChart history={hist} /></div>
          </div>
        </div>
      </div>
    </div>
  );
}


// CONFERENCES INDEX — sortable table with full avg stats computed from teams
function ConferencesPage({ nav }) {
  const { data, loading, error } = useData('conferences.json', 'teams.json');
  const { sc, sd, tog, ico } = useSort('avg_rating', 'desc');

  // Compute per-conference averages from the teams data
  const rows = useMemo(() => {
    if (!data) return [];
    const confs = data[0] || [];
    const teams = data[1] || [];

    const enriched = confs.map(c => {
      const ct = teams.filter(t => t.conference_id === c.conference_id);
      const avg = arr => {
        const vals = arr.filter(v => v != null && isFinite(v));
        return vals.length ? +(vals.reduce((s,v) => s+v, 0) / vals.length).toFixed(1) : null;
      };
      return {
        ...c,
        avg_off:    avg(ct.map(t => +t.off)),
        avg_def:    avg(ct.map(t => +t.def)),
        avg_tempo:  avg(ct.map(t => +t.pace)),
        avg_resume: avg(ct.map(t => t.wab != null ? +t.wab : null)),
      };
    });
    return srt(enriched, sc, sd);
  }, [data, sc, sd]);

  if (loading) return <Spin />;
  if (error)   return <ErrMsg m={error} />;

  // Heat ranges across all conferences
  const avgOff    = rows.map(r => r.avg_off).filter(v => v != null && isFinite(v));
  const avgDef    = rows.map(r => r.avg_def).filter(v => v != null && isFinite(v));
  const avgRat    = rows.map(r => r.avg_rating).filter(v => v != null && isFinite(v));
  const avgTempo  = rows.map(r => r.avg_tempo).filter(v => v != null && isFinite(v));
  const avgRes    = rows.map(r => r.avg_resume).filter(v => v != null && isFinite(v));
  const [oLo,oHi]   = avgOff.length   ? [Math.min(...avgOff),   Math.max(...avgOff)]   : [0,1];
  const [dLo,dHi]   = avgDef.length   ? [Math.min(...avgDef),   Math.max(...avgDef)]   : [0,1];
  const [rLo,rHi]   = avgRat.length   ? [Math.min(...avgRat),   Math.max(...avgRat)]   : [0,1];
  const [tLo,tHi]   = avgTempo.length ? [Math.min(...avgTempo), Math.max(...avgTempo)] : [0,1];
  const [resLo,resHi] = avgRes.length ? [Math.min(...avgRes),   Math.max(...avgRes)]   : [0,1];

  return (
    <div className="page">
      <h1 className="page-title">D3 Conferences</h1>
      <p className="page-sub">{rows.length} conferences &middot; Click a conference name to see team standings</p>
      <div className="table-wrap">
        <div className="shint">Scroll right to see all columns &rarr;</div>
        <div className="tscroll">
          <table>
            <thead><tr>
              <Th col="conference"  sc={sc} ico={ico} tog={tog}>Conference</Th>
              <Th col="team_count"  sc={sc} ico={ico} tog={tog}>Teams</Th>
              <Th col="avg_rating"  sc={sc} ico={ico} tog={tog}>Avg Rating</Th>
              <Th col="avg_off"     sc={sc} ico={ico} tog={tog}>Avg Off</Th>
              <Th col="avg_def"     sc={sc} ico={ico} tog={tog}>Avg Def</Th>
              <Th col="avg_tempo"   sc={sc} ico={ico} tog={tog}>Avg Tempo</Th>
              <Th col="avg_resume"  sc={sc} ico={ico} tog={tog}>Avg WAB</Th>
            </tr></thead>
            <tbody>
              {rows.map(c => (
                <tr key={c.conference_id} style={{cursor:'pointer'}} onClick={() => nav(`#/conference/${c.conference_id}`)}>
                  <td><span className="tl">{c.conference}</span></td>
                  <td className="mono">{c.team_count}</td>
                  <td className="hc" style={hs(c.avg_rating, rLo, rHi)}>{c.avg_rating ?? '-'}</td>
                  <td className="hc" style={hs(c.avg_off,    oLo, oHi)}>{c.avg_off    ?? '-'}</td>
                  <td className="hc" style={hs(c.avg_def,    dLo, dHi, true)}>{c.avg_def ?? '-'}</td>
                  <td className="hc" style={hs(c.avg_tempo,  tLo, tHi)}>{c.avg_tempo  ?? '-'}</td>
                  <td className="hc" style={c.avg_resume != null ? hs(c.avg_resume, resLo, resHi) : {}}>{c.avg_resume ?? '-'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// CONFERENCE DETAIL — ALL hooks before early returns
function ConferencePage({ confId, nav }) {
  const { data, loading, error } = useData('teams.json','conferences.json');
  const { sc, sd, tog, ico } = useSort('rank', 'asc');

  const conf      = useMemo(() => data ? (data[1]||[]).find(c => c.conference_id===confId) : null, [data, confId]);
  const confTeams = useMemo(() => data ? (data[0]||[]).filter(t => t.conference_id===confId) : [], [data, confId]);
  const rows      = useMemo(() => srt(confTeams, sc, sd), [confTeams, sc, sd]);
  // Conference rank = position when all conferences sorted by avg_rating desc
  const confRank  = useMemo(() => {
    if (!data) return null;
    const sorted = [...(data[1]||[])].sort((a,b) => b.avg_rating - a.avg_rating);
    const idx = sorted.findIndex(c => c.conference_id === confId);
    return idx >= 0 ? idx + 1 : null;
  }, [data, confId]);

  const ra = rows.map(t => +t.rating).filter(isFinite);
  const of = rows.map(t => +t.off).filter(isFinite);
  const df = rows.map(t => +t.def).filter(isFinite);
  const wb = rows.map(t => t.wab!=null?+t.wab:null).filter(v => v!=null&&isFinite(v));
  const [rn,rx] = ra.length>1?[Math.min(...ra),Math.max(...ra)]:[0,1];
  const [on,ox] = of.length>1?[Math.min(...of),Math.max(...of)]:[0,1];
  const [dn,dx] = df.length>1?[Math.min(...df),Math.max(...df)]:[0,1];
  const [wn,wx] = wb.length  ?[Math.min(...wb),Math.max(...wb)]:[-1,1];

  if (loading) return <Spin />;
  if (error)   return <ErrMsg m={error} />;
  if (!conf)   return (
    <div className="page">
      <button className="back-btn" onClick={() => nav('#/conferences')}>&larr; Conferences</button>
      <div className="errmsg">Conference not found. (ID: "{confId}")</div>
    </div>
  );

  return (
    <div className="page">
      <button className="back-btn" onClick={() => nav('#/conferences')}>&larr; All Conferences</button>
      <div className="chdr">
        <h1>{conf.conference}</h1>
        <div className="cbs"><div className="val">{conf.team_count}</div><div className="lbl">Teams</div></div>
        <div className="cbs"><div className="val">#{confRank}</div><div className="lbl">Conf. Rank</div></div>
        <div className="cbs"><div className="val">{conf.avg_rating}</div><div className="lbl">Avg Rating</div></div>
      </div>
      <div className="table-wrap">
        <div className="shint">Scroll right to see all columns &rarr;</div>
        <div className="tscroll">
          <table>
            <thead><tr>
              <Th col="rank"      sc={sc} ico={ico} tog={tog} style={{position:'sticky',left:0,zIndex:2,background:'var(--navy)'}}>Rank</Th>
              <Th col="full_team" sc={sc} ico={ico} tog={tog} style={{position:'sticky',zIndex:2,background:'var(--navy)',boxShadow:'2px 0 4px rgba(28,43,75,.12)'}}>Team</Th>
              <Th col="record"    sc={sc} ico={ico} tog={tog}>Record</Th>
              <Th col="rating"    sc={sc} ico={ico} tog={tog}>Rating</Th>
              <Th col="off"       sc={sc} ico={ico} tog={tog}>Off</Th>
              <Th col="def"       sc={sc} ico={ico} tog={tog}>Def</Th>
              <Th col="pace"      sc={sc} ico={ico} tog={tog}>Tempo</Th>
              <Th col="wab"       sc={sc} ico={ico} tog={tog}>WAB</Th>
            </tr></thead>
            <tbody>
              {rows.map((t, idx) => (
                <tr key={t.team_id}>
                  <td className="rc sticky-rank">{idx + 1}</td>
                  <td className="sticky-team"><span className="tl" onClick={() => nav(`#/team/${t.team_id}`)}>{t.full_team}</span></td>
                  <td className="mono">{t.record}</td>
                  <td className="hc" style={hs(+t.rating, rn, rx)}>{(+t.rating).toFixed(1)}</td>
                  <td className="hc" style={hs(+t.off,    on, ox)}>{(+t.off).toFixed(1)}</td>
                  <td className="hc" style={hs(+t.def,    dn, dx, true)}>{(+t.def).toFixed(1)}</td>
                  <td className="mono">{(+t.pace).toFixed(1)}</td>
                  <td className="hc" style={t.wab!=null?wabHs(+t.wab,wn,wx):{}}>{t.wab!=null?(t.wab>=0?'+':'')+(+t.wab).toFixed(1):'-'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// APP
function App() {
  const { hash, nav } = useRoute();
  const route = parseRoute(hash);
  const pages = {
    home:        <HomePage nav={nav} />,
    ratings:     <RatingsPage nav={nav} />,
    predictions: <PredictionsPage nav={nav} />,
    accuracy:    <AccuracyPage nav={nav} />,
    conferences: <ConferencesPage nav={nav} />,
    team:        <TeamPage teamId={route.id} nav={nav} />,
    conference:  <ConferencePage confId={route.id} nav={nav} />,
  };
  return (
    <>
      <Nav nav={nav} hash={hash} />
      {pages[route.page] || <div className="errmsg">Page not found.</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
