<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schauer Stats</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:       #1C2B4B;
      --navy-mid:   #243460;
      --navy-light: #344d8a;
      --bg:         #F0F2F6;
      --white:      #FFFFFF;
      --border:     #DDE1EA;
      --text:       #111827;
      --muted:      #6B7280;
      --accent:     #4A6CF7;
      --win:        #16a34a;
      --loss:       #dc2626;
      --header-h:   56px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body { font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; }
    #root { min-height: 100vh; display: flex; flex-direction: column; }

    /* NAV */
    nav {
      background: var(--navy); height: var(--header-h);
      display: flex; align-items: center; padding: 0 2rem; gap: 2rem;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 12px rgba(0,0,0,.35);
    }
    .nav-brand { font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; color:#fff; margin-right:auto; cursor:pointer; }
    .nav-link { color:rgba(255,255,255,.72); font-size:.8rem; font-weight:500; text-decoration:none; letter-spacing:.04em; cursor:pointer; transition:color .15s; white-space:nowrap; text-transform:uppercase; }
    .nav-link:hover, .nav-link.active { color:#fff; }

    /* LAYOUT */
    .page { padding:2.5rem 2rem; max-width:1200px; margin:0 auto; width:100%; flex:1; }
    .page-title { font-family:'Syne',sans-serif; font-size:1.75rem; font-weight:700; color:var(--navy); margin-bottom:.3rem; }
    .page-subtitle { color:var(--muted); font-size:.875rem; margin-bottom:1.75rem; }

    /* HOME CARDS */
    .home-hero { padding:3rem 2rem 0; max-width:1200px; margin:0 auto; }
    .hero-title { font-family:'Syne',sans-serif; font-size:2.25rem; font-weight:800; color:var(--navy); margin-bottom:.5rem; }
    .hero-sub { color:var(--muted); font-size:1rem; margin-bottom:2.5rem; }
    .card-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.5rem; padding:0 2rem 3rem; max-width:1200px; margin:0 auto; }
    .card { background:var(--white); border-radius:12px; border:1px solid var(--border); overflow:hidden; cursor:pointer; transition:transform .18s,box-shadow .18s; }
    .card:hover { transform:translateY(-3px); box-shadow:0 8px 28px rgba(28,43,75,.12); }
    .card-chart { height:150px; background:var(--bg); display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .card-chart svg { width:100%; height:100%; }
    .card-body { padding:1.25rem 1.5rem 1.5rem; }
    .card-body h3 { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; color:var(--navy); margin-bottom:.4rem; }
    .card-body p { color:var(--muted); font-size:.875rem; line-height:1.5; margin-bottom:1.25rem; }
    .card-btn { background:var(--navy); color:#fff; border:none; border-radius:8px; padding:.7rem 1.25rem; font-family:'IBM Plex Sans',sans-serif; font-weight:500; font-size:.875rem; cursor:pointer; width:100%; transition:background .15s; }
    .card-btn:hover { background:var(--navy-mid); }

    /* TABLES */
    .table-wrap { background:var(--white); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
    .table-toolbar { padding:.875rem 1.25rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:.75rem; flex-wrap:wrap; }
    .search-input { border:1px solid var(--border); border-radius:7px; padding:.45rem .875rem; font-family:'IBM Plex Sans',sans-serif; font-size:.875rem; outline:none; width:200px; transition:border-color .15s; }
    .search-input:focus { border-color:var(--accent); }
    .conf-filter { border:1px solid var(--border); border-radius:7px; padding:.45rem .875rem; font-family:'IBM Plex Sans',sans-serif; font-size:.875rem; background:var(--white); outline:none; cursor:pointer; }
    .results-count { margin-left:auto; color:var(--muted); font-size:.8rem; }
    table { width:100%; border-collapse:collapse; }
    thead tr { background:var(--navy); }
    thead th { padding:.65rem 1rem; font-family:'Syne',sans-serif; font-size:.68rem; font-weight:600; color:rgba(255,255,255,.85); letter-spacing:.07em; text-transform:uppercase; text-align:left; white-space:nowrap; cursor:pointer; user-select:none; }
    thead th:hover { color:#fff; }
    thead th .si { margin-left:.3em; opacity:.6; font-size:.7em; }
    thead th.sorted .si { opacity:1; }
    tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:#f6f8fd; }
    tbody td { padding:.6rem 1rem; font-size:.875rem; }
    .rank-cell { color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:.78rem; }
    .team-link { color:var(--navy); font-weight:600; cursor:pointer; }
    .team-link:hover { color:var(--accent); text-decoration:underline; }
    .conf-badge { display:inline-block; background:#EEF1F9; color:var(--navy-mid); border-radius:5px; padding:.15rem .5rem; font-size:.72rem; font-weight:500; cursor:pointer; }
    .conf-badge:hover { background:#dce2f4; }
    .heat-cell { font-family:'IBM Plex Mono',monospace; font-size:.8rem; text-align:right; border-radius:4px; padding:.3rem .6rem !important; }
    .mono { font-family:'IBM Plex Mono',monospace; font-size:.8rem; }

    /* TEAM PAGE */
    .team-header { background:var(--navy); color:#fff; border-radius:12px; padding:1.75rem 2rem; margin-bottom:1.5rem; display:flex; gap:2rem; flex-wrap:wrap; align-items:center; }
    .team-header h1 { font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:800; margin-bottom:.2rem; }
    .team-header .conf-link { color:rgba(255,255,255,.65); font-size:.875rem; cursor:pointer; }
    .team-header .conf-link:hover { color:#fff; text-decoration:underline; }
    .stat-block { text-align:center; min-width:70px; }
    .stat-block .val { font-family:'Syne',sans-serif; font-size:1.75rem; font-weight:800; line-height:1; }
    .stat-block .lbl { font-size:.68rem; color:rgba(255,255,255,.6); letter-spacing:.06em; text-transform:uppercase; margin-top:.2rem; }
    .stat-divider { width:1px; background:rgba(255,255,255,.15); align-self:stretch; flex-shrink:0; }
    .stat-mini-row { display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .stat-mini { background:var(--white); border:1px solid var(--border); border-radius:10px; padding:.875rem 1.25rem; flex:1; min-width:110px; }
    .stat-mini .val { font-family:'Syne',sans-serif; font-weight:700; font-size:1.4rem; color:var(--navy); line-height:1; }
    .stat-mini .lbl { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-top:.2rem; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
    @media(max-width:700px) { .two-col { grid-template-columns:1fr; } }
    .section-card { background:var(--white); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
    .section-card-header { padding:.875rem 1.25rem; border-bottom:1px solid var(--border); font-family:'Syne',sans-serif; font-weight:700; font-size:.88rem; color:var(--navy); letter-spacing:.02em; display:flex; justify-content:space-between; align-items:center; }
    .game-row { display:flex; align-items:center; padding:.55rem 1.25rem; border-bottom:1px solid var(--border); gap:.6rem; font-size:.82rem; }
    .game-row:last-child { border-bottom:none; }
    .game-date { color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:.74rem; width:68px; flex-shrink:0; }
    .game-ha { font-size:.7rem; color:var(--muted); width:18px; flex-shrink:0; text-align:center; }
    .game-opp { flex:1; font-weight:500; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .game-opp:hover { color:var(--accent); text-decoration:underline; }
    .game-score { font-family:'IBM Plex Mono',monospace; font-size:.8rem; text-align:right; min-width:62px; }
    .game-wab { font-family:'IBM Plex Mono',monospace; font-size:.74rem; text-align:right; min-width:54px; }
    .win  { color:var(--win);  font-weight:600; }
    .loss { color:var(--loss); font-weight:600; }
    .pred { color:var(--muted); }

    /* RATING HISTORY CHART */
    .chart-card { background:var(--white); border-radius:12px; border:1px solid var(--border); overflow:hidden; margin-bottom:1.5rem; }
    .chart-card-header { padding:.875rem 1.25rem; border-bottom:1px solid var(--border); font-family:'Syne',sans-serif; font-weight:700; font-size:.88rem; color:var(--navy); }
    .chart-inner { padding:1rem 1.25rem 1rem; }

    /* CONFERENCE PAGE */
    .conf-header { background:var(--navy); border-radius:12px; padding:1.75rem 2rem; color:#fff; margin-bottom:1.5rem; display:flex; align-items:center; gap:2rem; flex-wrap:wrap; }
    .conf-header h1 { font-family:'Syne',sans-serif; font-size:1.75rem; font-weight:800; flex:1; }

    /* CONFERENCES INDEX */
    .conf-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:1rem; }
    .conf-card { background:var(--white); border:1px solid var(--border); border-radius:10px; padding:1.1rem 1.25rem; cursor:pointer; transition:transform .15s,box-shadow .15s; }
    .conf-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(28,43,75,.1); }
    .conf-card h3 { font-family:'Syne',sans-serif; font-weight:700; color:var(--navy); margin-bottom:.5rem; font-size:.95rem; }
    .conf-card .meta { font-size:.78rem; color:var(--muted); display:flex; gap:1rem; }

    /* PREDICTIONS PAGE */
    .filter-btn { padding:.4rem .9rem; border-radius:7px; border:1px solid var(--border); background:var(--white); color:var(--text); font-size:.78rem; font-weight:500; cursor:pointer; text-transform:capitalize; }
    .filter-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }
    .pred-date-group { padding:.45rem 1.25rem; background:var(--bg); font-size:.72rem; font-weight:600; color:var(--muted); letter-spacing:.05em; text-transform:uppercase; }
    .pred-row { display:flex; align-items:center; padding:.6rem 1.25rem; border-bottom:1px solid var(--border); gap:1rem; font-size:.875rem; }
    .pred-row:last-child { border-bottom:none; }
    .pred-team { flex:1; font-weight:500; cursor:pointer; }
    .pred-team:hover { color:var(--accent); text-decoration:underline; }
    .pred-score { font-family:'IBM Plex Mono',monospace; font-size:.82rem; text-align:right; min-width:50px; }
    .final-badge   { font-size:.68rem; background:#e5e7eb; border-radius:4px; padding:.1rem .4rem; color:var(--muted); }
    .upcoming-badge { font-size:.68rem; background:#dbeafe; border-radius:4px; padding:.1rem .4rem; color:#1d4ed8; }

    /* ACCURACY PAGE */
    .acc-summary { display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .acc-stat { background:var(--white); border:1px solid var(--border); border-radius:10px; padding:1rem 1.5rem; flex:1; min-width:130px; }
    .acc-stat .val { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:700; color:var(--navy); }
    .acc-stat .lbl { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .error-bar { height:10px; border-radius:3px; display:inline-block; vertical-align:middle; }

    /* MISC */
    .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin .7s linear infinite; margin:3rem auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading { text-align:center; padding:4rem; color:var(--muted); font-size:.95rem; }
    .back-btn { display:inline-flex; align-items:center; gap:.4rem; color:var(--navy); font-size:.82rem; font-weight:500; cursor:pointer; margin-bottom:1.25rem; background:none; border:none; padding:0; }
    .back-btn:hover { color:var(--accent); }
    .empty-msg { padding:1.5rem 1.25rem; color:var(--muted); font-size:.875rem; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ─── DATA FETCHING ────────────────────────────────────────────────────────────
const _cache = {};
async function fetchJSON(file) {
  if (_cache[file]) return _cache[file];
  const res = await fetch(`data/${file}`);
  if (!res.ok) throw new Error(`Failed to load ${file}`);
  _cache[file] = await res.json();
  return _cache[file];
}
function useData(...files) {
  const [data, setData]     = useState(null);
  const [error, setError]   = useState(null);
  const [loading, setLoading] = useState(true);
  const key = files.join(',');
  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    Promise.all(files.map(f => fetchJSON(f)))
      .then(r => { if (!cancelled) { setData(r); setLoading(false); } })
      .catch(e => { if (!cancelled) { setError(e.message); setLoading(false); } });
    return () => { cancelled = true; };
  }, [key]);
  return { data, error, loading };
}

// ─── ROUTER ──────────────────────────────────────────────────────────────────
function useRoute() {
  const [hash, setHash] = useState(window.location.hash || '#/');
  useEffect(() => {
    const h = () => setHash(window.location.hash || '#/');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const navigate = useCallback(path => { window.location.hash = path; }, []);
  return { hash, navigate };
}
function parseRoute(hash) {
  const path = hash.replace(/^#/, '') || '/';
  if (path === '/' || path === '')     return { page: 'home' };
  if (path === '/ratings')             return { page: 'ratings' };
  if (path === '/predictions')         return { page: 'predictions' };
  if (path === '/resume')              return { page: 'resume' };
  if (path === '/conferences')         return { page: 'conferences' };
  if (path === '/accuracy')            return { page: 'accuracy' };
  if (path.startsWith('/team/'))       return { page: 'team',       id: path.slice(6) };
  if (path.startsWith('/conference/')) return { page: 'conference', id: path.slice(13) };
  return { page: 'home' };
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function heatStyle(val, min, max, reverse = false) {
  if (val == null) return {};
  let t = max === min ? 0.5 : (val - min) / (max - min);
  if (reverse) t = 1 - t;
  t = Math.max(0, Math.min(1, t));
  const r = Math.round(28  + (220 - 28)  * (1 - t));
  const g = Math.round(43  + (230 - 43)  * (1 - t));
  const b = Math.round(75  + (255 - 75)  * (1 - t));
  return { background: `rgb(${r},${g},${b})`, color: t > 0.5 ? '#fff' : '#111827' };
}
function errorHeatStyle(val, maxVal) {
  const t = Math.min(val / maxVal, 1);
  const r = Math.round(22  + (220 - 22)  * t);
  const g = Math.round(163 + (38  - 163) * t);
  const b = Math.round(74  + (38  - 74)  * t);
  return { background: `rgb(${r},${g},${b})`, color: '#fff' };
}
function useSort(defaultCol, defaultDir = 'asc') {
  const [sortCol, setSortCol] = useState(defaultCol);
  const [sortDir, setSortDir] = useState(defaultDir);
  const toggleSort = col => {
    if (col === sortCol) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  };
  const sortIcon = col => col === sortCol ? (sortDir === 'asc' ? '▲' : '▼') : '⇅';
  return { sortCol, sortDir, toggleSort, sortIcon };
}
function sortedData(data, col, dir) {
  return [...data].sort((a, b) => {
    const av = a[col]; const bv = b[col];
    if (av == null) return 1; if (bv == null) return -1;
    const cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv;
    return dir === 'asc' ? cmp : -cmp;
  });
}
function fmtDate(d) {
  try { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' }); }
  catch { return d; }
}
function fmtDateLong(d) {
  try { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' }); }
  catch { return d; }
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function Nav({ navigate, currentHash }) {
  const links = [
    ['#/ratings',     'D3 Ratings'],
    ['#/predictions', 'Predictions'],
    ['#/resume',      'Resume'],
    ['#/conferences', 'Conferences'],
    ['#/accuracy',    'Pred. Accuracy'],
  ];
  return (
    <nav>
      <span className="nav-brand" onClick={() => navigate('#/')}>Schauer Stats</span>
      {links.map(([href, label]) => (
        <span key={href} className={`nav-link${currentHash === href ? ' active' : ''}`}
          onClick={() => navigate(href)}>{label}</span>
      ))}
    </nav>
  );
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function BellCurve() {
  const pts = [];
  for (let x = -3.5; x <= 3.5; x += 0.08) pts.push([x, Math.exp(-0.5*x*x)/Math.sqrt(2*Math.PI)]);
  const d = 'M ' + pts.map(([x,y]) => `${((x+3.5)/7)*220+10},${130-y*310}`).join(' L ');
  return <svg viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg">
    <rect width="240" height="140" fill="#e8edf8"/>
    <path d={d} fill="none" stroke="#4A6CF7" strokeWidth="2.2"/>
  </svg>;
}
function SigmoidChart() {
  const sig = x => 1/(1+Math.exp(-x));
  const xs = [-3.5,-2.5,-1.8,-.8,-.2,.4,1,1.6,2.2,2.8,3.2,3.7];
  const linePts = [];
  for (let x=-4.5; x<=4.5; x+=0.15) linePts.push(`${((x+4.5)/9)*220+10},${130-sig(x)*110-10}`);
  return <svg viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg">
    <rect width="240" height="140" fill="#e8edf8"/>
    <path d={`M ${linePts.join(' L ')}`} fill="none" stroke="#374151" strokeWidth="1.5" strokeDasharray="5,4"/>
    {xs.map((x,i) => { const cy=130-Math.min(1,Math.max(0,sig(x)+(Math.sin(i*7)*.04)))*110-10; return <circle key={i} cx={((x+4.5)/9)*220+10} cy={cy} r="3.5" fill="#4A6CF7" opacity=".85"/>; })}
  </svg>;
}
function BarChart() {
  const hs = [40,60,80,100,120,155,170];
  return <svg viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg">
    <rect width="240" height="140" fill="#e8edf8"/>
    {hs.map((h,i) => <rect key={i} x={15+i*30} y={130-h} width="20" height={h} rx="3" fill={i<3?'#93c5fd':i<5?'#4A6CF7':'#1d3e8a'} opacity=".9"/>)}
  </svg>;
}
function AccuracyChart() {
  const pts = Array.from({length:12},(_,i)=>({ x:15+i*19, y:115-Math.abs(Math.sin(i*1.3)*40+Math.cos(i*0.7)*25) }));
  const line = pts.map(p=>`${p.x},${p.y}`).join(' L ');
  return <svg viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg">
    <rect width="240" height="140" fill="#e8edf8"/>
    <path d={`M ${line}`} fill="none" stroke="#4A6CF7" strokeWidth="2"/>
    {pts.map((p,i) => <circle key={i} cx={p.x} cy={p.y} r="3" fill={p.y > 80 ? '#16a34a' : '#dc2626'} opacity=".85"/>)}
  </svg>;
}
function HomePage({ navigate }) {
  const cards = [
    { title:'D3 Basketball Predictive Ratings', desc:'Forward-looking team ratings based on opponent-adjusted performance.', btn:'View Ratings', href:'#/ratings', chart:<BellCurve/> },
    { title:'D3 Basketball Score Predictions',  desc:'Game-by-game predictions based on each team\'s predictive rating.',   btn:'View Predictions', href:'#/predictions', chart:<SigmoidChart/> },
    { title:'D3 Basketball Resume Quality',      desc:'Quantifying each team\'s record relative to a hypothetical bubble team.', btn:'View Resume Scores', href:'#/resume', chart:<BarChart/> },
    { title:'Prediction Accuracy',              desc:'See which games were called well — and which weren\'t.',            btn:'View Accuracy', href:'#/accuracy', chart:<AccuracyChart/> },
  ];
  return (
    <>
      <div className="home-hero">
        <h1 className="hero-title">D3 Men's Basketball Stats</h1>
        <p className="hero-sub">Ratings, predictions, and resume scores for all Division III teams</p>
      </div>
      <div className="card-grid">
        {cards.map(c => (
          <div key={c.href} className="card" onClick={() => navigate(c.href)}>
            <div className="card-chart">{c.chart}</div>
            <div className="card-body">
              <h3>{c.title}</h3><p>{c.desc}</p>
              <button className="card-btn" onClick={e=>{e.stopPropagation();navigate(c.href);}}>{c.btn}</button>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

// ─── SHARED TABLE COMPONENTS ──────────────────────────────────────────────────
function TeamTable({ teams, navigate, sortCol, sortDir, toggleSort, sortIcon, extraCols }) {
  const ratings  = teams.map(t=>t.rating);
  const offs     = teams.map(t=>t.off);
  const defs     = teams.map(t=>t.def);
  const [rMin,rMax] = [Math.min(...ratings),Math.max(...ratings)];
  const [oMin,oMax] = [Math.min(...offs),   Math.max(...offs)];
  const [dMin,dMax] = [Math.min(...defs),   Math.max(...defs)];

// ─── RATING HISTORY CHART ─────────────────────────────────────────────────────
function RatingHistoryChart({ history }) {
  if (!history || history.length < 2) return <div className="empty-msg">Not enough history to display chart.</div>;

  const W = 580, H = 200, PAD = { top:16, right:20, bottom:28, left:44 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top  - PAD.bottom;

  const seasons = history.map(h => h.season);
  const ratings = history.map(h => h.rating);
  const minS = Math.min(...seasons), maxS = Math.max(...seasons);
  const minR = Math.min(...ratings, 0) - 3;
  const maxR = Math.max(...ratings,  0) + 3;

  const xScale = s => PAD.left + ((s - minS) / (maxS - minS || 1)) * innerW;
  const yScale = r => PAD.top  + (1 - (r - minR) / (maxR - minR)) * innerH;

  const pts = history.map(h => [xScale(h.season), yScale(h.rating)]);
  const linePath = `M ${pts.map(p=>p.join(',')).join(' L ')}`;
  const zeroY = yScale(0);

  // Y axis ticks
  const yTicks = [];
  const tickStep = Math.ceil((maxR - minR) / 5 / 5) * 5;
  for (let v = Math.ceil(minR/tickStep)*tickStep; v <= maxR; v += tickStep) yTicks.push(v);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}} xmlns="http://www.w3.org/2000/svg">
      {/* zero line */}
      {zeroY >= PAD.top && zeroY <= H - PAD.bottom && (
        <line x1={PAD.left} y1={zeroY} x2={W-PAD.right} y2={zeroY} stroke="#DDE1EA" strokeWidth="1" strokeDasharray="4,3"/>
      )}
      {/* Y ticks */}
      {yTicks.map(v => (
        <g key={v}>
          <line x1={PAD.left-4} y1={yScale(v)} x2={PAD.left} y2={yScale(v)} stroke="#DDE1EA" strokeWidth="1"/>
          <text x={PAD.left-6} y={yScale(v)+4} textAnchor="end" fontSize="10" fill="#9CA3AF">{v}</text>
        </g>
      ))}
      {/* X ticks */}
      {history.map(h => (
        <g key={h.season}>
          <line x1={xScale(h.season)} y1={H-PAD.bottom} x2={xScale(h.season)} y2={H-PAD.bottom+4} stroke="#DDE1EA" strokeWidth="1"/>
          <text x={xScale(h.season)} y={H-PAD.bottom+14} textAnchor="middle" fontSize="9" fill="#9CA3AF">
            {h.season === 2020 ? "'20" : String(h.season).slice(2)}
          </text>
        </g>
      ))}
      {/* axis lines */}
      <line x1={PAD.left} y1={PAD.top} x2={PAD.left} y2={H-PAD.bottom} stroke="#DDE1EA" strokeWidth="1"/>
      <line x1={PAD.left} y1={H-PAD.bottom} x2={W-PAD.right} y2={H-PAD.bottom} stroke="#DDE1EA" strokeWidth="1"/>
      {/* line */}
      <path d={linePath} fill="none" stroke="#1C2B4B" strokeWidth="2" strokeLinejoin="round"/>
      {/* dots with tooltip */}
      {pts.map(([x,y],i) => (
        <g key={i}>
          <circle cx={x} cy={y} r="4.5" fill="#4A6CF7" stroke="#fff" strokeWidth="1.5"/>
          <title>{history[i].season}: {history[i].rating} (Off {history[i].off} / Def {history[i].def})</title>
        </g>
      ))}
    </svg>
  );
}

function TeamPage({ teamId, navigate }) {
  const { data, loading, error } = useData('teams.json', 'games_2026.json', 'future_games.json', 'rating_history.json');

  if (loading) return <div className="spinner"/>;
  if (error)   return <div className="loading">⚠ {error}</div>;

  const [teamsData, games2026, futureGames, historyData] = data;
  const team = teamsData.find(t => t.team_id === teamId);

  if (!team) return (
    <div className="page">
      <button className="back-btn" onClick={() => navigate('#/ratings')}>← All Teams</button>
      <div className="loading">Team not found. Make sure the data files are up to date.</div>
    </div>
  );

  // Rating history for this team
  const history = historyData.filter(h => h.team_id === teamId).sort((a,b) => a.season - b.season);

  // Past games (completed 2026 season)
  const pastGames = games2026
    .filter(g => g.team_1_id === teamId || g.team_2_id === teamId)
    .sort((a,b) => b.date.localeCompare(a.date));  // most recent first

  // Upcoming games
  const upcoming = futureGames
    .filter(g => g.team_1_id === teamId || g.team_2_id === teamId)
    .sort((a,b) => a.date.localeCompare(b.date));

  const GameRow = ({ g, isFuture }) => {
    const isTeam1  = g.team_1_id === teamId;
    const opp      = isTeam1 ? g.team_2     : g.team_1;
    const oppId    = isTeam1 ? g.team_2_id  : g.team_1_id;
    const myScore  = isTeam1 ? g.team_1_score : g.team_2_score;
    const oppScore = isTeam1 ? g.team_2_score : g.team_1_score;
    const myPred   = isTeam1 ? (g.team_1_pred_score ?? g.team_1_pred_score) : (g.team_2_pred_score ?? g.team_2_pred_score);

    if (isFuture) {
      ha = g.hfa === 'vs' ? (isTeam1 ? 'vs' : '@') : g.hfa === '@' ? (isTeam1 ? '@' : 'vs') : 'neu';
    } else {
      const hfaNum = g.team_1_hfa;
      if (hfaNum === 0) ha = 'neu';
      else if (isTeam1) ha = hfaNum === 1 ? 'vs' : '@';
      else ha = hfaNum === 1 ? '@' : 'vs';

    const won  = !isFuture && myScore  > oppScore;
    const lost = !isFuture && myScore  < oppScore;

        )}
      </div>
    );

        <div style={{flex:1}}>
          <h1>{team.full_team}</h1>
          <span className="conf-link" onClick={() => navigate(`#/conference/${team.conference_id}`)}>
            {team.conference} →
          </span>
        </div>
        <div className="stat-divider"/>
        <div className="stat-block">
          <div className="val">#{team.rank}</div>
          <div className="lbl">Rating Rank</div>
        </div>
        <div className="stat-divider"/>
        <div className="stat-block">
          <div className="val">{(+team.rating).toFixed(1)}</div>
          <div className="lbl">Rating</div>
        </div>
        <div className="stat-divider"/>
        <div className="stat-block">
          <div className="val">{team.record}</div>
          <div className="lbl">D3 Record</div>
        </div>
        {team.resume_rank != null && <>
          <div className="stat-divider"/>
          <div className="stat-block">
            <div className="val">#{team.resume_rank}</div>
            <div className="lbl">Resume Rank</div>
          </div>
        </>}
      </div>

      {/* Stat strip */}
      <div className="stat-mini-row">
        {[
          { label:'Offensive Rating', val: (+team.off).toFixed(1) },
          { label:'Defensive Rating', val: (+team.def).toFixed(1) },
          { label:'Tempo',            val: (+team.pace).toFixed(1) },

          {pastGames.length === 0
            ? <div className="empty-msg">No completed games found.</div>
            : pastGames.map((g,i) => <GameRow key={i} g={g} isFuture={false}/>)}
        </div>
      </div>
    </div>
  );
}

// ─── CONFERENCES INDEX ────────────────────────────────────────────────────────
function ConferencesPage({ navigate }) {
  const { data, loading, error } = useData('conferences.json');
  if (loading) return <div className="spinner"/>;
  if (error)   return <div className="loading">⚠ {error}</div>;
  const conferences = [...(data[0] ?? [])].sort((a,b) => a.conference.localeCompare(b.conference));
  return (
    <div className="page">
      <h1 className="page-title">D3 Conferences</h1>
      <p className="page-subtitle">{conferences.length} conferences · Click any to see standings</p>
      <div className="conf-grid">
        {conferences.map(c => (
          <div key={c.conference_id} className="conf-card" onClick={() => navigate(`#/conference/${c.conference_id}`)}>
            <h3>{c.conference}</h3>
            <div className="meta">
              <span>{c.team_count} teams</span>
              <span>Best: #{c.best_rank}</span>
              <span>Avg: {c.avg_rating}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── CONFERENCE PAGE ──────────────────────────────────────────────────────────
function ConferencePage({ confId, navigate }) {
  const { data, loading, error } = useData('teams.json', 'conferences.json');
  if (loading) return <div className="spinner"/>;
  if (error)   return <div className="loading">⚠ {error}</div>;
  const [teamsData, confsData] = data;
  const conf      = confsData.find(c => c.conference_id === confId);
  const confTeams = teamsData.filter(t => t.conference_id === confId);
  const sorted    = [...confTeams].sort((a,b) => a.rank - b.rank);
  if (!conf) return <div className="page"><button className="back-btn" onClick={()=>navigate('#/conferences')}>← Conferences</button><div className="loading">Conference not found.</div></div>;
  const { sortCol, sortDir, toggleSort, sortIcon } = useSort('rank','asc');
  return (
    <div className="page">
      <button className="back-btn" onClick={()=>navigate('#/conferences')}>← All Conferences</button>
      <div className="conf-header">
        <h1>{conf.conference}</h1>
        <div className="stat-block"><div className="val">{conf.team_count}</div><div className="lbl">Teams</div></div>
        <div className="stat-divider" style={{width:1,background:'rgba(255,255,255,.15)',alignSelf:'stretch'}}/>
        <div className="stat-block"><div className="val">#{conf.best_rank}</div><div className="lbl">Best Rank</div></div>
        <div className="stat-divider" style={{width:1,background:'rgba(255,255,255,.15)',alignSelf:'stretch'}}/>
        <div className="stat-block"><div className="val">{conf.avg_rating}</div><div className="lbl">Avg Rating</div></div>
      </div>
      <div className="table-wrap">
        <TeamTable teams={sortedData(sorted,sortCol,sortDir)} navigate={navigate} sortCol={sortCol} sortDir={sortDir} toggleSort={toggleSort} sortIcon={sortIcon}
          extraCols={[
            { col:'resume_rank', label:'Resume Rank', render: t => t.resume_rank ? `#${t.resume_rank}` : '–' },
            { col:'wab', label:'WAB', render: t => t.wab != null ? (+t.wab).toFixed(2) : '–' },
          ]}
        />
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const { hash, navigate } = useRoute();
  const route = parseRoute(hash);
  const pageMap = {
    home:        <HomePage navigate={navigate}/>,
    ratings:     <RatingsPage navigate={navigate}/>,
    predictions: <PredictionsPage navigate={navigate}/>,
    resume:      <ResumePage navigate={navigate}/>,
    conferences: <ConferencesPage navigate={navigate}/>,
    accuracy:    <AccuracyPage navigate={navigate}/>,
    team:        <TeamPage teamId={route.id} navigate={navigate}/>,
    conference:  <ConferencePage confId={route.id} navigate={navigate}/>,
  };
  return (
    <>
      <Nav navigate={navigate} currentHash={hash}/>
      {pageMap[route.page] ?? <div className="loading">Page not found.</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
