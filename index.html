<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schauer Stats</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#1C2B4B;--navy2:#243460;--bg:#F0F2F6;--white:#fff;
      --border:#DDE1EA;--text:#111827;--muted:#6B7280;
      --accent:#3B5BDB;--win:#16a34a;--loss:#dc2626;--nav-h:52px;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%}
    body{font-family:'IBM Plex Sans',sans-serif;font-size:15px}
    #root{min-height:100vh;display:flex;flex-direction:column}

    nav{background:var(--navy);height:var(--nav-h);display:flex;align-items:center;
        padding:0 1.5rem;position:sticky;top:0;z-index:200;box-shadow:0 1px 8px rgba(0,0,0,.3)}
    .nav-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:#fff;
               cursor:pointer;white-space:nowrap;margin-right:auto;padding-right:1rem}
    .nav-links{display:flex;gap:0}
    .nav-link{color:rgba(255,255,255,.7);font-size:.74rem;font-weight:500;cursor:pointer;
              padding:.45rem .7rem;border-radius:5px;letter-spacing:.04em;text-transform:uppercase;
              white-space:nowrap;transition:color .12s,background .12s}
    .nav-link:hover{color:#fff;background:rgba(255,255,255,.08)}
    .nav-link.active{color:#fff}
    .nav-toggle{display:none;background:none;border:none;cursor:pointer;padding:.25rem;color:#fff}
    @media(max-width:680px){
      .nav-links{display:none;flex-direction:column;position:absolute;top:var(--nav-h);
                 left:0;right:0;background:var(--navy);padding:.5rem 0;z-index:199;
                 box-shadow:0 4px 12px rgba(0,0,0,.3)}
      .nav-links.open{display:flex}
      .nav-link{padding:.7rem 1.5rem;border-radius:0;font-size:.8rem}
      .nav-toggle{display:block}
    }

    .page{padding:2rem 1.5rem;max-width:1200px;margin:0 auto;width:100%;flex:1}
    .page-title{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--navy);margin-bottom:.25rem}
    .page-sub{color:var(--muted);font-size:.8rem;margin-bottom:1.5rem;line-height:1.5}
    .back-btn{display:inline-flex;align-items:center;gap:.3rem;color:var(--muted);font-size:.8rem;
              cursor:pointer;margin-bottom:1.25rem;background:none;border:none;padding:0}
    .back-btn:hover{color:var(--navy)}

    .table-wrap{background:var(--white);border-radius:10px;border:1px solid var(--border);overflow:hidden}
    .toolbar{padding:.7rem 1rem;border-bottom:1px solid var(--border);display:flex;
             align-items:center;gap:.6rem;flex-wrap:wrap}
    .srch{border:1px solid var(--border);border-radius:6px;padding:.38rem .75rem;
          font-family:'IBM Plex Sans',sans-serif;font-size:.82rem;outline:none;
          width:185px;background:var(--bg);transition:border-color .15s}
    .srch:focus{border-color:var(--accent);background:#fff}
    .csel{border:1px solid var(--border);border-radius:6px;padding:.38rem .75rem;
          font-family:'IBM Plex Sans',sans-serif;font-size:.82rem;background:var(--bg);
          outline:none;cursor:pointer;max-width:155px}
    .rcount{margin-left:auto;color:var(--muted);font-size:.74rem;white-space:nowrap}
    .tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .shint{display:none;font-size:.7rem;color:var(--muted);padding:.3rem 1rem;border-bottom:1px solid var(--border)}
    @media(max-width:680px){.shint{display:block}}
    table{width:100%;border-collapse:collapse;min-width:500px}
    thead tr{background:var(--navy)}
    thead th{padding:.58rem .85rem;font-family:'Syne',sans-serif;font-size:.63rem;font-weight:700;
             color:rgba(255,255,255,.8);letter-spacing:.08em;text-transform:uppercase;
             text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
    thead th:hover{color:#fff}
    thead th .si{margin-left:.2em;opacity:.5;font-size:.65em}
    thead th.sorted .si{opacity:1}
    tbody tr{border-bottom:1px solid var(--border);transition:background .08s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#f5f7fc}
    tbody td{padding:.52rem .85rem;font-size:.83rem}
    .rc{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.75rem;width:42px}
    .tl{color:var(--navy);font-weight:600;cursor:pointer}
    .tl:hover{color:var(--accent);text-decoration:underline}
    .cb{display:inline-block;background:#EEF1F9;color:var(--navy2);border-radius:4px;
        padding:.11rem .42rem;font-size:.69rem;font-weight:600;cursor:pointer;white-space:nowrap}
    .cb:hover{background:#dce2f4}
    .hc{font-family:'IBM Plex Mono',monospace;font-size:.77rem;border-radius:3px;
        padding:.22rem .48rem!important;text-align:right}
    .mono{font-family:'IBM Plex Mono',monospace;font-size:.77rem}
    .win{color:var(--win);font-weight:600}
    .loss{color:var(--loss);font-weight:600}

    .home-wrap{padding:2.5rem 1.5rem 3rem;max-width:1200px;margin:0 auto}
    .home-title{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--navy);margin-bottom:.4rem}
    .home-sub{color:var(--muted);margin-bottom:2.25rem;font-size:.9rem}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:1.25rem}
    .card{background:var(--white);border-radius:10px;border:1px solid var(--border);overflow:hidden;
          cursor:pointer;transition:transform .15s,box-shadow .15s}
    .card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(28,43,75,.1)}
    .card-img{height:125px;background:var(--bg);overflow:hidden}
    .card-img svg{width:100%;height:100%}
    .card-body{padding:1rem 1.2rem 1.3rem}
    .card-body h3{font-family:'Syne',sans-serif;font-weight:700;font-size:.93rem;color:var(--navy);margin-bottom:.3rem}
    .card-body p{color:var(--muted);font-size:.81rem;line-height:1.55;margin-bottom:1rem}
    .card-btn{background:var(--navy);color:#fff;border:none;border-radius:7px;padding:.58rem 1rem;
              font-family:'IBM Plex Sans',sans-serif;font-size:.81rem;font-weight:500;cursor:pointer;width:100%}
    .card-btn:hover{background:var(--navy2)}

    .team-banner{background:var(--navy);color:#fff;border-radius:10px;padding:1.4rem 1.5rem;margin-bottom:1.2rem}
    .team-banner h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:.2rem;line-height:1.2}
    .team-banner .cl{color:rgba(255,255,255,.6);font-size:.8rem;cursor:pointer}
    .team-banner .cl:hover{color:#fff;text-decoration:underline}
    .banner-stats{display:flex;gap:1.5rem;margin-top:.9rem;flex-wrap:wrap}
    .bstat .val{font-family:'IBM Plex Mono',monospace;font-size:1.25rem;color:#fff;line-height:1}
    .bstat .lbl{font-size:.62rem;color:rgba(255,255,255,.55);letter-spacing:.07em;text-transform:uppercase;margin-top:.18rem}

    .stat-row{display:flex;gap:.7rem;margin-bottom:1.2rem;flex-wrap:wrap}
    .sbox{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:.7rem .95rem;flex:1;min-width:95px}
    .sbox .val{font-family:'IBM Plex Mono',monospace;font-size:1.15rem;color:var(--navy);line-height:1}
    .sbox .lbl{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.18rem}

    .cbox{background:var(--white);border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:1.2rem}
    .box-hdr{padding:.65rem 1rem;border-bottom:1px solid var(--border);font-size:.77rem;font-weight:600;color:var(--navy)}
    .box-body{padding:.8rem 1rem}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
    @media(max-width:680px){.two-col{grid-template-columns:1fr}}
    .scard{background:var(--white);border-radius:10px;border:1px solid var(--border);overflow:hidden}

    .grow{display:flex;align-items:center;padding:.48rem 1rem;border-bottom:1px solid var(--border);gap:.5rem;font-size:.79rem}
    .grow:last-child{border-bottom:none}
    .gdate{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.7rem;width:58px;flex-shrink:0}
    .gha{font-size:.67rem;width:20px;flex-shrink:0;text-align:center;color:var(--muted)}
    .gopp{flex:1;font-weight:500;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
    .gopp:hover{color:var(--accent);text-decoration:underline}
    .gsc{font-family:'IBM Plex Mono',monospace;font-size:.77rem;text-align:right;white-space:nowrap;min-width:55px}
    .gwab{font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-align:right;min-width:48px;white-space:nowrap}
    .muted{color:var(--muted)}
    .empty{padding:1.2rem 1rem;color:var(--muted);font-size:.81rem}

    .dhdr{padding:.38rem 1rem;background:var(--bg);font-size:.67rem;font-weight:600;
          color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
    .prow{display:flex;align-items:center;padding:.52rem 1rem;border-bottom:1px solid var(--border);gap:.75rem;font-size:.83rem}
    .prow:last-child{border-bottom:none}
    .pmatch{flex:1;min-width:0}
    .pline{display:flex;align-items:center;gap:.38rem;margin-bottom:.13rem}
    .pline:last-child{margin-bottom:0}
    .pha{font-size:.67rem;color:var(--muted);width:20px;flex-shrink:0}
    .pteam{font-weight:500;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
    .pteam:hover{color:var(--accent);text-decoration:underline}
    .ppts{font-family:'IBM Plex Mono',monospace;font-size:.79rem;color:var(--muted);white-space:nowrap}

    .acc-stats{display:flex;gap:.7rem;margin-bottom:1.4rem;flex-wrap:wrap}
    .astat{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;flex:1;min-width:105px}
    .astat .val{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:var(--navy);line-height:1}
    .astat .lbl{font-size:.64rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.18rem}

    .chdr{background:var(--navy);border-radius:10px;padding:1.4rem 1.5rem;color:#fff;
          margin-bottom:1.2rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap}
    .chdr h1{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;flex:1}
    .cbs .val{font-family:'IBM Plex Mono',monospace;font-size:1.25rem;color:#fff;line-height:1}
    .cbs .lbl{font-size:.62rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.07em;margin-top:.18rem}

    .spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--navy);
             border-radius:50%;animation:spin .7s linear infinite;margin:3rem auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .errmsg{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.9rem;line-height:1.6}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback}=React;

// DATA
const _c={};
async function fj(f){if(_c[f])return _c[f];const r=await fetch(f);if(!r.ok)throw new Error(`Could not load ${f} (${r.status})`);_c[f]=await r.json();return _c[f];}
function useData(...files){
  const[st,setSt]=useState({data:null,error:null,loading:true});
  const key=files.join(',');
  useEffect(()=>{
    let dead=false;
    setSt({data:null,error:null,loading:true});
    Promise.all(files.map(fj))
      .then(d=>{if(!dead)setSt({data:d,error:null,loading:false});})
      .catch(e=>{if(!dead)setSt({data:null,error:e.message,loading:false});});
    return()=>{dead=true;};
  },[key]);
  return st;
}

// ROUTER
function useRoute(){
  const[hash,setHash]=useState(window.location.hash||'#/');
  useEffect(()=>{
    const h=()=>setHash(window.location.hash||'#/');
    window.addEventListener('hashchange',h);
    return()=>window.removeEventListener('hashchange',h);
  },[]);
  const nav=useCallback(p=>{window.location.hash=p;window.scrollTo(0,0);},[]);
  return{hash,nav};
}
function parseRoute(hash){
  const p=hash.replace(/^#/,'')||'/';
  if(p==='/'||p==='')return{page:'home'};
  if(p==='/ratings')return{page:'ratings'};
  if(p==='/predictions')return{page:'predictions'};
  if(p==='/accuracy')return{page:'accuracy'};
  if(p==='/conferences')return{page:'conferences'};
  if(p.startsWith('/team/'))return{page:'team',id:p.slice(6)};
  if(p.startsWith('/conference/'))return{page:'conference',id:p.slice(13)};
  return{page:'home'};
}

// HELPERS
function hs(val,min,max,rev=false){
  if(val==null||!isFinite(min)||!isFinite(max)||min===max)return{};
  let t=(val-min)/(max-min);if(rev)t=1-t;t=Math.max(0,Math.min(1,t));
  const r=Math.round(28+(220-28)*(1-t)),g=Math.round(43+(230-43)*(1-t)),b=Math.round(75+(255-75)*(1-t));
  return{background:`rgb(${r},${g},${b})`,color:t>.5?'#fff':'#111827'};
}
function wabHs(val,min,max){
  if(val==null||!isFinite(min)||!isFinite(max))return{};
  const amax=Math.max(Math.abs(min),Math.abs(max),.01);
  const t=Math.max(-1,Math.min(1,val/amax));
  if(t>=0)return{background:`rgba(22,163,74,${.12+t*.7})`,color:t>.5?'#fff':'#14532d'};
  return{background:`rgba(220,38,38,${.12+(-t)*.7})`,color:(-t)>.5?'#fff':'#7f1d1d'};
}
function errHs(val,max){
  const t=Math.min(val/(max||1),1);
  return{background:`rgb(${Math.round(22+(220-22)*t)},${Math.round(163+(38-163)*t)},${Math.round(74+(38-74)*t)})`,color:'#fff'};
}
function useSort(c0,d0='asc'){
  const[sc,setSc]=useState(c0);const[sd,setSd]=useState(d0);
  const tog=c=>{if(c===sc)setSd(d=>d==='asc'?'desc':'asc');else{setSc(c);setSd('asc');}};
  const ico=c=>c===sc?(sd==='asc'?'▲':'▼'):'⇅';
  return{sc,sd,tog,ico};
}
function srt(arr,c,d){
  return[...arr].sort((a,b)=>{
    const av=a[c],bv=b[c];
    if(av==null)return 1;if(bv==null)return-1;
    const cmp=typeof av==='string'?av.localeCompare(bv):av-bv;
    return d==='asc'?cmp:-cmp;
  });
}
function fmtS(d){try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch{return d;}}
function fmtL(d){try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}catch{return d;}}
function Spin(){return<div className="spinner"/>;}
function Err({m}){return<div className="errmsg">Could not load data: {m}<br/><small>Make sure data files are committed to your repo.</small></div>;}

// NAV
function Nav({nav,hash}){
  const[open,setOpen]=useState(false);
  const links=[['#/ratings','D3 Ratings'],['#/predictions','Predictions'],['#/accuracy','Pred. Accuracy'],['#/conferences','Conferences']];
  const go=h=>{nav(h);setOpen(false);};
  return(
    <nav>
      <span className="nav-brand" onClick={()=>go('#/')}>Schauer Stats</span>
      <button className="nav-toggle" onClick={()=>setOpen(o=>!o)} aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          {open
            ?<path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd"/>
            :<path fillRule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clipRule="evenodd"/>
          }
        </svg>
      </button>
      <div className={`nav-links${open?' open':''}`}>
        {links.map(([h,l])=>(
          <span key={h} className={`nav-link${hash===h?' active':''}`} onClick={()=>go(h)}>{l}</span>
        ))}
      </div>
    </nav>
  );
}

// HOME
function MChart({type}){
  if(type==='bell'){
    const pts=[];for(let x=-3.5;x<=3.5;x+=.1)pts.push([x,Math.exp(-.5*x*x)/Math.sqrt(2*Math.PI)]);
    const d='M '+pts.map(([x,y])=>`${((x+3.5)/7)*230+10},${115-y*275}`).join(' L ');
    return<svg viewBox="0 0 250 125" xmlns="http://www.w3.org/2000/svg"><rect width="250" height="125" fill="#eaecf4"/><path d={d} fill="none" stroke="#1C2B4B" strokeWidth="2.2"/></svg>;
  }
  if(type==='sigmoid'){
    const sig=x=>1/(1+Math.exp(-x));
    const lp=[];for(let x=-5;x<=5;x+=.2)lp.push(`${((x+5)/10)*230+10},${110-sig(x)*90-5}`);
    const dots=[-4,-3,-2,-1.2,-.4,.4,1.2,2,3,4].map(x=>[((x+5)/10)*230+10,110-Math.min(1,Math.max(0,sig(x)+(Math.sin(x*5)*.03)))*90-5]);
    return<svg viewBox="0 0 250 125" xmlns="http://www.w3.org/2000/svg"><rect width="250" height="125" fill="#eaecf4"/><path d={`M ${lp.join(' L ')}`} fill="none" stroke="#6b7280" strokeWidth="1.5" strokeDasharray="5,3"/>{dots.map(([cx,cy],i)=><circle key={i} cx={cx} cy={cy} r="3.5" fill="#1C2B4B" opacity=".8"/>)}</svg>;
  }
  if(type==='bars'){
    const vs=[38,55,72,90,110,140,162,142,115,85,60];
    return<svg viewBox="0 0 250 125" xmlns="http://www.w3.org/2000/svg"><rect width="250" height="125" fill="#eaecf4"/>{vs.map((h,i)=><rect key={i} x={10+i*21} y={120-h} width="16" height={h} rx="2" fill={`rgba(28,43,75,${.28+i/vs.length*.6})`}/>)}</svg>;
  }
  const pts2=[[30,88],[55,68],[80,102],[110,82],[140,58],[170,92],[200,72],[225,48],[55,38],[130,108]];
  return<svg viewBox="0 0 250 125" xmlns="http://www.w3.org/2000/svg"><rect width="250" height="125" fill="#eaecf4"/><line x1="10" y1="10" x2="240" y2="115" stroke="#9ca3af" strokeWidth="1.5" strokeDasharray="4,3"/>{pts2.map(([x,y],i)=>{const e=Math.abs(y-(10+x*(105/230)));return<circle key={i} cx={x} cy={y} r="4" fill={e<25?'#16a34a':'#dc2626'} opacity=".8"/>})}</svg>;
}
function HomePage({nav}){
  const cards=[
    {title:'D3 Predictive Ratings',desc:'Opponent-adjusted ratings covering offense, defense, and tempo for all 400+ D3 teams.',btn:'View Ratings',href:'#/ratings',type:'bell'},
    {title:'Score Predictions',desc:'Pre-game score predictions for upcoming games based on team ratings.',btn:'View Predictions',href:'#/predictions',type:'sigmoid'},
    {title:'Prediction Accuracy',desc:'Compare predicted vs. actual scores — see where the model excels and where it misses.',btn:'View Accuracy',href:'#/accuracy',type:'scatter'},
    {title:'D3 Conferences',desc:'Conference standings ranked by average rating with links to each conference page.',btn:'View Conferences',href:'#/conferences',type:'bars'},
  ];
  return(
    <div className="home-wrap">
      <h1 className="home-title">D3 Men's Basketball</h1>
      <p className="home-sub">Ratings, predictions, and resume scores for all Division III teams</p>
      <div className="card-grid">
        {cards.map(c=>(
          <div key={c.href} className="card" onClick={()=>nav(c.href)}>
            <div className="card-img"><MChart type={c.type}/></div>
            <div className="card-body">
              <h3>{c.title}</h3><p>{c.desc}</p>
              <button className="card-btn" onClick={e=>{e.stopPropagation();nav(c.href);}}>{c.btn}</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// SORTABLE TH
function Th({col,sc,ico,tog,children,style}){
  return<th className={sc===col?'sorted':''} onClick={()=>tog(col)} style={style}>{children} <span className="si">{ico(col)}</span></th>;
}

// RATINGS + RESUME COMBINED
function RatingsPage({nav}){
  const{data,loading,error}=useData('teams.json');
  const[search,setSearch]=useState('');
  const[cf,setCf]=useState('All');
  const{sc,sd,tog,ico}=useSort('rank','asc');

  // ALL hooks above — safe to early-return below
  const teams=useMemo(()=>data?data[0]??[],[data]);
  const confs=useMemo(()=>['All',...[...new Set(teams.map(t=>t.conference))].sort()],[teams]);
  const rows=useMemo(()=>{
    let r=teams;

// RATING HISTORY CHART
function RHChart({history}){
  if(!history||history.length<2)return<div className="empty">Not enough history to display.</div>;
  const W=560,H=185,P={t:12,r:14,b:25,l:40};
  const iW=W-P.l-P.r,iH=H-P.t-P.b;
  const rats=history.map(h=>h.rating),seas=history.map(h=>h.season);
  const minS=Math.min(...seas),maxS=Math.max(...seas);
  const minR=-47,maxR=47;  // fixed global range so all teams are comparable
  const xS=s=>P.l+((s-minS)/(maxS-minS||1))*iW;
  const yS=r=>P.t+(1-(r-minR)/(maxR-minR))*iH;
  const pts=history.map(h=>[xS(h.season),yS(h.rating)]);
  const z=yS(0);
  const ts=Math.max(5,Math.ceil((maxR-minR)/5/5)*5);
  const yt=[];for(let v=Math.ceil(minR/ts)*ts;v<=maxR;v+=ts)yt.push(v);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}} xmlns="http://www.w3.org/2000/svg">
      {z>=P.t&&z<=H-P.b&&<line x1={P.l} y1={z} x2={W-P.r} y2={z} stroke="#DDE1EA" strokeWidth="1" strokeDasharray="4,3"/>}
      {yt.map(v=>(
        <g key={v}>
          <line x1={P.l-3} y1={yS(v)} x2={P.l} y2={yS(v)} stroke="#DDE1EA" strokeWidth="1"/>
          <text x={P.l-5} y={yS(v)+3.5} textAnchor="end" fontSize="9" fill="#9CA3AF">{v}</text>
        </g>
      ))}
      {history.map(h=>(
        <g key={h.season}>
          <line x1={xS(h.season)} y1={H-P.b} x2={xS(h.season)} y2={H-P.b+3} stroke="#DDE1EA" strokeWidth="1"/>
          <text x={xS(h.season)} y={H-P.b+12} textAnchor="middle" fontSize="7.5" fill="#9CA3AF">{`${String(h.season-1).slice(2)}-${String(h.season).slice(2)}`}</text>
        </g>
      ))}
      <line x1={P.l} y1={P.t} x2={P.l} y2={H-P.b} stroke="#DDE1EA" strokeWidth="1"/>
      <line x1={P.l} y1={H-P.b} x2={W-P.r} y2={H-P.b} stroke="#DDE1EA" strokeWidth="1"/>
      <path d={`M ${pts.map(p=>p.join(',')).join(' L ')}`} fill="none" stroke="#1C2B4B" strokeWidth="2" strokeLinejoin="round"/>
      {pts.map(([x,y],i)=>(
        <g key={i}>
          <circle cx={x} cy={y} r="3.8" fill="#3B5BDB" stroke="#fff" strokeWidth="1.5"/>
          <title>{history[i].season}: {history[i].rating} (Off {history[i].off} / Def {history[i].def})</title>
        </g>
      ))}
    </svg>
  );
}

// TEAM PAGE
function TeamPage({teamId,nav}){
  const{data,loading,error}=useData('teams.json','games_2026.json','future_games.json','rating_history.json');
  if(loading)return<Spin/>;
  if(error)return<Err m={error}/>;
  const[td,g26,fg,hd]=data;
  const team=td.find(t=>t.team_id===teamId);
  if(!team)return<div className="page"><button className="back-btn" onClick={()=>nav('#/ratings')}>← All Teams</button><div className="errmsg">Team not found.</div></div>;
  const[gameSort,setGameSort]=useState('date');
  const hist=hd.filter(h=>h.team_id===teamId).sort((a,b)=>a.season-b.season);
  const pastBase=g26.filter(g=>g.team_1_id===teamId||g.team_2_id===teamId);
  const past=pastBase.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const sortedPast=gameSort==='wab'
    ?pastBase.slice().sort((a,b)=>{
        const wa=teamId===a.team_1_id?a.t1_wab:a.t2_wab;
        const wb_=teamId===b.team_1_id?b.t1_wab:b.t2_wab;
        if(wa==null&&wb_==null)return 0;if(wa==null)return 1;if(wb_==null)return-1;
        return wb_-wa;
      })
    :past;
  const upcoming=fg.filter(g=>g.team_1_id===teamId||g.team_2_id===teamId).sort((a,b)=>a.date.localeCompare(b.date));

  function GRow({g,fut}){
    const it1=g.team_1_id===teamId;
    const opp=it1?g.team_2:g.team_1,oppId=it1?g.team_2_id:g.team_1_id;
    const ms=it1?g.team_1_score:g.team_2_score,os=it1?g.team_2_score:g.team_1_score;
    const mp=it1?g.team_1_pred_score:g.team_2_pred_score,op=it1?g.team_2_pred_score:g.team_1_pred_score;
    let ha;
    if(fut){ha=g.hfa==='vs'?(it1?'vs':'@'):g.hfa==='@'?(it1?'@':'vs'):'n';}
    else{const n=g.team_1_hfa;ha=n===0?'n':(it1?(n===1?'vs':'@'):(n===1?'@':'vs'));}
    const won=!fut&&ms>os,lost=!fut&&ms<os;
    const wab=!fut?(it1?g.t1_wab:g.t2_wab):null;
    return(
      <div className="grow">
        <span className="gdate">{fmtS(g.date)}</span>
        <span className="gha" style={{color:ha==='vs'?'#2563eb':ha==='@'?'#7c3aed':'var(--muted)'}}>{ha}</span>
        <span className="gopp" onClick={()=>nav(`#/team/${oppId}`)}>{opp}</span>
        {fut
          ?<span className="gsc muted">{Math.round(mp)}–{Math.round(op)}</span>
          :<span className={`gsc ${won?'win':lost?'loss':''}`}>{ms}–{os}</span>}
        {!fut&&<span className="gwab" style={{color:wab==null?'var(--muted)':wab>=0?'var(--win)':'var(--loss)'}}>{wab!=null?(wab>=0?'+':'')+wab.toFixed(2):'–'}</span>}
      </div>
    );
  }

  return(
    <div className="page">
      <button className="back-btn" onClick={()=>nav('#/ratings')}>← All Teams</button>
      <div className="team-banner">
        <h1>{team.full_team}</h1>
        <span className="cl" onClick={()=>nav(`#/conference/${team.conference_id}`)}>{team.conference} →</span>
        <div className="banner-stats">
          {[
            {val:`#${team.rank}`,lbl:'Rating Rank'},
            {val:(+team.rating).toFixed(1),lbl:'Rating'},
            {val:team.record,lbl:'Record'},
            team.resume_rank&&{val:`#${team.resume_rank}`,lbl:'Resume Rank'},
          ].filter(Boolean).map(s=>(
            <div key={s.lbl} className="bstat"><div className="val">{s.val}</div><div className="lbl">{s.lbl}</div></div>
          ))}
        </div>
      </div>
      <div className="stat-row">
        {[
          {val:(+team.off).toFixed(1),lbl:'Off Rating'},
          {val:(+team.def).toFixed(1),lbl:'Def Rating'},
          {val:(+team.pace).toFixed(1),lbl:'Tempo'},
          team.wab!=null&&{val:(team.wab>=0?'+':'')+(+team.wab).toFixed(2),lbl:'Wins Above Bubble'},
          team.win_qual!=null&&{val:(+team.win_qual).toFixed(2),lbl:'Win Quality'},
          team.loss_qual!=null&&{val:(+team.loss_qual).toFixed(2),lbl:'Loss Quality'},
        ].filter(Boolean).map(s=>(
          <div key={s.lbl} className="sbox"><div className="val">{s.val}</div><div className="lbl">{s.lbl}</div></div>
        ))}
      </div>
      <div className="cbox">
        <div className="box-hdr">Rating History — End of Season, 2012–2026</div>
        <div className="box-body"><RHChart history={hist}/></div>
      </div>
      <div className="two-col">
        <div className="scard">
          <div className="box-hdr">Upcoming Games ({upcoming.length})</div>
          {upcoming.length===0?<div className="empty">No upcoming games scheduled.</div>:upcoming.map((g,i)=><GRow key={i} g={g} fut={true}/>)}
        </div>
        <div className="scard">
          <div className="box-hdr" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>2025–26 Results ({past.length})</span>
            <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
              <span style={{color:'var(--muted)',fontSize:'.7rem',fontWeight:400}}>Sort:</span>
              <button onClick={()=>setGameSort('date')} style={{fontSize:'.68rem',padding:'.15rem .45rem',borderRadius:3,border:'1px solid var(--border)',background:gameSort==='date'?'var(--navy)':'transparent',color:gameSort==='date'?'#fff':'var(--muted)',cursor:'pointer'}}>Date</button>
              <button onClick={()=>setGameSort('wab')} style={{fontSize:'.68rem',padding:'.15rem .45rem',borderRadius:3,border:'1px solid var(--border)',background:gameSort==='wab'?'var(--navy)':'transparent',color:gameSort==='wab'?'#fff':'var(--muted)',cursor:'pointer'}}>WAB</button>
            </div>
          </div>
          {past.length===0?<div className="empty">No completed games found.</div>:sortedPast.map((g,i)=><GRow key={i} g={g} fut={false}/>)}
        </div>
      </div>
    </div>
  );
}

  const{sc,sd,tog,ico}=useSort('rank','asc');

  const conf=useMemo(()=>data?(data[1]??[]).find(c=>c.conference_id===confId):null,[data,confId]);
  const confTeams=useMemo(()=>data?(data[0]??[]).filter(t=>t.conference_id===confId):[],[data,confId]);
  const rows=useMemo(()=>srt(confTeams,sc,sd),[confTeams,sc,sd]);

  if(loading)return<Spin/>;
  if(error)return<Err m={error}/>;
  if(!conf)return(
    <div className="page">
      <button className="back-btn" onClick={()=>nav('#/conferences')}>← Conferences</button>
      <div className="errmsg">Conference not found.<br/><small>ID: "{confId}"</small></div>
    </div>
  );

  const ra=rows.map(t=>+t.rating).filter(isFinite);
  const of=rows.map(t=>+t.off).filter(isFinite);
  const df=rows.map(t=>+t.def).filter(isFinite);
  const wb=rows.map(t=>t.wab!=null?+t.wab:null).filter(v=>v!=null&&isFinite(v));
  const[rn,rx]=ra.length>1?[Math.min(...ra),Math.max(...ra)]:[0,1];
  const[on,ox]=of.length>1?[Math.min(...of),Math.max(...of)]:[0,1];
  const[dn,dx]=df.length>1?[Math.min(...df),Math.max(...df)]:[0,1];
  const[wn,wx]=wb.length?[Math.min(...wb),Math.max(...wb)]:[-1,1];

  return(
    <div className="page">
      <button className="back-btn" onClick={()=>nav('#/conferences')}>← All Conferences</button>
      <div className="chdr">
        <h1>{conf.conference}</h1>
        {[{val:conf.team_count,lbl:'Teams'},{val:`#${conf.best_rank}`,lbl:'Best Rank'},{val:conf.avg_rating,lbl:'Avg Rating'}].map(s=>(
          <div key={s.lbl} className="cbs"><div className="val">{s.val}</div><div className="lbl">{s.lbl}</div></div>
        ))}
      </div>
      <div className="table-wrap">
        <div className="shint">Scroll right to see all columns →</div>
        <div className="tscroll">
          <table>
            <thead><tr>
              <Th col="rank" sc={sc} ico={ico} tog={tog}>Rank</Th>
              <Th col="full_team" sc={sc} ico={ico} tog={tog}>Team</Th>
              <Th col="record" sc={sc} ico={ico} tog={tog}>Record</Th>
              <Th col="rating" sc={sc} ico={ico} tog={tog}>Rating</Th>
              <Th col="off" sc={sc} ico={ico} tog={tog}>Off</Th>
              <Th col="def" sc={sc} ico={ico} tog={tog}>Def</Th>
              <Th col="pace" sc={sc} ico={ico} tog={tog}>Tempo</Th>
              <Th col="resume_rank" sc={sc} ico={ico} tog={tog}>Res. Rank</Th>
              <Th col="wab" sc={sc} ico={ico} tog={tog}>WAB</Th>
            </tr></thead>
            <tbody>
              {rows.map(t=>(
                <tr key={t.team_id}>
                  <td className="rc">{t.rank}</td>
                  <td><span className="tl" onClick={()=>nav(`#/team/${t.team_id}`)}>{t.full_team}</span></td>
                  <td className="mono">{t.record}</td>
                  <td className="hc" style={hs(+t.rating,rn,rx)}>{(+t.rating).toFixed(1)}</td>
                  <td className="hc" style={hs(+t.off,on,ox)}>{(+t.off).toFixed(1)}</td>
                  <td className="hc" style={hs(+t.def,dn,dx,true)}>{(+t.def).toFixed(1)}</td>
                  <td className="mono">{(+t.pace).toFixed(1)}</td>
                  <td className="rc">{t.resume_rank?`#${t.resume_rank}`:'–'}</td>
                  <td className="hc" style={t.wab!=null?wabHs(+t.wab,wn,wx):{}}>{t.wab!=null?(t.wab>=0?'+':'')+(+t.wab).toFixed(2):'–'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// APP
function App(){
  const{hash,nav}=useRoute();
  const route=parseRoute(hash);
  const pages={
    home:<HomePage nav={nav}/>,
    ratings:<RatingsPage nav={nav}/>,
    predictions:<PredictionsPage nav={nav}/>,
    accuracy:<AccuracyPage nav={nav}/>,
    conferences:<ConferencesPage nav={nav}/>,
    team:<TeamPage teamId={route.id} nav={nav}/>,
    conference:<ConferencePage confId={route.id} nav={nav}/>,
  };
  return<><Nav nav={nav} hash={hash}/>{pages[route.page]??<div className="errmsg">Page not found.</div>}</>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
